<style>
  /* Splash. Inline + system-font only so it paints on the very first
     frame, before fonts / Supabase CDN / the app bundle finish loading.
     Neutral by design — adopts the user's OS theme so the hand-off to
     the app feels like the content arriving, not a brand reveal. */
  #mybjj-splash{position:fixed;inset:0;z-index:9999;background:#fafafa;color:#1a1a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;transition:opacity .3s ease}
  @media(prefers-color-scheme:dark){#mybjj-splash{background:#0a0a0a;color:#e5e5e5}}
  #mybjj-splash img{width:64px;height:64px;border-radius:50%}
  /* Spinner — hidden for the first 800ms so quick loads never reveal
     it. After that it fades to opacity .5 in 200ms and keeps rotating
     at 1.2s/turn until the splash is dismissed. */
  #mybjj-splash .mybjj-splash-spinner{color:#999;opacity:0;animation:mybjj-splash-spin 1.2s linear infinite,mybjj-splash-fadein .2s ease .8s forwards}
  @media(prefers-color-scheme:dark){#mybjj-splash .mybjj-splash-spinner{color:#555}}
  #mybjj-splash .mybjj-splash-fallback{display:none;max-width:280px;text-align:center;font-size:14px;line-height:1.5;opacity:.85}
  #mybjj-splash.mybjj-splash-fail .mybjj-splash-fallback{display:block}
  #mybjj-splash.mybjj-splash-fail .mybjj-splash-spinner{animation:none;opacity:0}
  #mybjj-splash.mybjj-splash-fail img{opacity:.5}
  #mybjj-splash .mybjj-splash-refresh{margin-top:14px;background:transparent;color:inherit;border:1px solid currentColor;border-radius:10px;padding:8px 20px;font-family:inherit;font-size:13px;font-weight:600;letter-spacing:.5px;cursor:pointer;opacity:.7}
  @keyframes mybjj-splash-spin{to{transform:rotate(360deg)}}
  @keyframes mybjj-splash-fadein{to{opacity:.5}}
  @keyframes mybjj-app-fadein{from{opacity:0}to{opacity:1}}
  body.mybjj-splash-gone #app{animation:mybjj-app-fadein .2s ease-out}
</style>

/* iOS Safari renders input[type=date] with a default intrinsic width,
 * extra inner padding, and a calendar-picker indicator that drifts
 * the visible value away from the row's right edge — making the DOB
 * row look misaligned next to the text inputs in Edit profile.
 * The rules below normalize the date input to match .einput exactly:
 *   - kill the appearance default + min-width
 *   - 0 padding / margin / min-height (parent .erow controls spacing)
 *   - right-align both the field and the value pseudo-element
 *   - tighten the calendar icon so it sits flush at the right edge
 */
.einput[type="date"]{
  -webkit-appearance:none;appearance:none;
  min-height:0;min-width:0;padding:0;margin:0;line-height:1.2;
  text-align:right;direction:ltr;
}
.einput[type="date"]::-webkit-date-and-time-value{
  text-align:right;padding:0;margin:0;
}
.einput[type="date"]::-webkit-calendar-picker-indicator{
  margin:0 0 0 6px;padding:0;opacity:.55;cursor:pointer;
}

// IBJJF Promotion Authority Rules
// Returns the maximum belt a given instructor belt+degree can promote TO
function maxPromotableBelt(belt, deg){
  const ORDER=['white','blue','purple','brown','black'];
  if(belt==='black' && deg>=2) return 'black';
  if(belt==='black' && deg<2)  return 'brown';   // can promote up to brown
  if(belt==='brown')           return 'purple';  // exception regions only; standard = needs black belt
  if(belt==='purple')          return 'blue';    // exception regions only
  return null; // cannot promote
}

// Check if instructor can award a specific promotion
function canPromote(instructorBelt, instructorDeg, targetBelt, targetDeg, isNewBelt){
  // isNewBelt = true means belt promotion (e.g. white→blue), false = stripe
  const maxBelt = maxPromotableBelt(instructorBelt, instructorDeg);
  if(!maxBelt) return {ok:false, reason:'Not authorized to promote students.'};
  const ORDER=['white','blue','purple','brown','black'];
  const maxIdx = ORDER.indexOf(maxBelt);
  const targetIdx = ORDER.indexOf(targetBelt);
  if(isNewBelt){
    // promoting to targetBelt
    if(targetIdx > maxIdx) return {ok:false, reason:'Requires a '+maxBelt+'-level promotion authority or higher.'};
  } else {
    // adding a stripe to targetBelt
    if(targetIdx > maxIdx) return {ok:false, reason:'Requires a higher-ranked instructor to award stripes at this level.'};
  }
  return {ok:true, reason:null};
}

// ATTENDANCE — rows hydrated from public.attendance for today (and any
// other day the user navigates to via the day strip). Each row has the
// DB id, the student row's _dbId, the class date/time, and a status of
// 'going' | 'present' | 'absent'.
let ATTENDANCE=[];

function dk(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function isHol(d){return PH.has(dk(d));}
function getDC(d){if(isHol(d))return [];return(TT[d.getDay()]||[]).map(c=>({...c,date:dk(d),id:dk(d)+'_'+c.time+'_'+c.id}));}
function bdays(){const a=[];for(let i=0;i<7;i++){const d=new Date(TODAY);d.setDate(TODAY.getDate()+i);a.push(d);}return a;}
function fd(d){return `${DS[d.getDay()]}, ${d.getDate()} ${MS[d.getMonth()]}`;}
// gattFor: list of student legacy_ids checked in to a class (date + time).
// Replaces the old hard-coded gatt(time) lookup table. Filters to
// status in ('going','present') so 'absent' rows don't surface as
// peers in the social-signal view.
function gattFor(date,time){
  if(!date||!time)return [];
  const rows=ATTENDANCE.filter(a=>a.classDate===date&&a.classTime===time&&a.status!=='absent');
  return rows.map(a=>{
    const s=STUDENTS.find(x=>x._dbId===a.studentDbId);
    return s?s.id:null;
  }).filter(Boolean);
}
function attendanceFor(date,time){
  if(!date||!time)return [];
  return ATTENDANCE.filter(a=>a.classDate===date&&a.classTime===time);
}
function myStudentRow(){
  if(!S.profile||!S.profile.id)return null;
  // For parents, the relevant student row is whichever child they're
  // currently viewing (parentSelectedChild). For everyone else, the
  // row linked by user_id is the one used.
  if(S.me&&S.me.role==='parent'&&typeof parentSelectedChild==='function'){
    return parentSelectedChild()||null;
  }
  return STUDENTS.find(x=>x._userId===S.profile.id)||null;
}

// _fmtJnyDate — journey entries store the date in two formats:
//   - ISO "YYYY-MM-DD" (every entry written from this batch onward,
//     plus doPromote / saveEditStaff)
//   - Legacy "Mon YYYY" free-text (seed rows + older entries)
// Display rule: render either as "Mon YYYY". The legacy strings
// pass through unchanged; ISO strings get a month/year format.
function _fmtJnyDate(d){
  if(d==null||d==='')return null;
  const s=String(d);
  const m=s.match(/^(\d{4})-(\d{2})(?:-\d{2})?$/);
  if(!m)return s; // already a free-text label like "Mar 2026"
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const mo=parseInt(m[2],10);
  if(mo<1||mo>12)return s;
  return months[mo-1]+' '+m[1];
}

function revertPromo(id){
  const s=STUDENTS.find(x=>x.id===id);if(!s)return;
  const idx=PROMOTION_LOG.findIndex(p=>p.studentId===id);
  if(idx<0)return;
  const p=PROMOTION_LOG[idx];
  if(!confirm('Revert promotion for '+s.name+'? This will restore their previous belt/stripe.'))return;
  s.belt=p.fromBelt;s.deg=p.fromDeg;s.grade=0;s.giGrade=0;
  PROMOTION_LOG.splice(idx,1);
  if(s.journey&&s.journey.length){
    s.journey.pop();
    const prev=s.journey.slice().reverse().find(j=>j.done);
    if(prev)prev.current=true;
  }
  render();
  withSb(c=>c.from('promotions').delete().eq('legacy_id',p.id),'delete promotion');
  if(s._dbId)withSb(c=>c.from('students').update({belt:s.belt,degree:s.deg,grade:0,gi_grade:0,journey:s.journey||[]}).eq('id',s._dbId),'revert student');
}

function doPromote(id, isBeltPromotion){
  const s=STUDENTS.find(x=>x.id===id);if(!s)return;
  const me=S.me;
  const instrBelt=me.belt||'white';const instrDeg=me.deg||0;
  const ORDER_A=['white','blue','purple','brown','black'];
  const ORDER_K=['white','grey','yellow','orange','green'];
  const ORDER=s.prog==='kids'?ORDER_K:ORDER_A;

  let newPromo=null;
  if(isBeltPromotion){
    const curIdx=ORDER.indexOf(s.belt);
    if(curIdx>=ORDER.length-1){alert('Already at maximum belt.');return;}
    const nextBelt=ORDER[curIdx+1];
    const chk=canPromote(instrBelt,instrDeg,nextBelt,0,true);
    if(!chk.ok){alert('Not authorized: '+chk.reason);return;}
    const fromBelt=s.belt;const fromDeg=s.deg;
    s.belt=nextBelt;s.deg=0;s.grade=0;s.giGrade=0;
    newPromo={
      id:'pl'+Date.now(),studentId:s.id,studentName:s.name,
      fromBelt,fromDeg,toBelt:nextBelt,toDeg:0,isNewBelt:true,
      date:new Date().toISOString().slice(0,10),
      promotedBy:me.name,unit:s.unit||'nb'
    };
    PROMOTION_LOG.unshift(newPromo);
    if(!s.journey)s.journey=[];
    const bl=s.prog==='kids'?BK:BA;
    const nb=bl[nextBelt]||BA.white;
    const doneIdx=s.journey.findLastIndex?s.journey.findLastIndex(j=>j.done):-1;
    if(doneIdx>=0)s.journey[doneIdx].current=false;
    s.journey.push({belt:nextBelt,label:nb.label+' belt',date:new Date().toISOString().slice(0,10),classes:s.total,done:true,current:true,auto:true});
  } else {
    const maxDeg=s.belt==='black'?6:4;
    if(s.deg>=maxDeg){alert('Already at maximum stripes for this belt.');return;}
    const chk=canPromote(instrBelt,instrDeg,s.belt,s.deg,false);
    if(!chk.ok){alert('Not authorized: '+chk.reason);return;}
    const fromDeg=s.deg;
    s.deg+=1;s.grade=0;s.giGrade=0;
    newPromo={
      id:'pl'+Date.now(),studentId:s.id,studentName:s.name,
      fromBelt:s.belt,fromDeg,toBelt:s.belt,toDeg:s.deg,isNewBelt:false,
      date:new Date().toISOString().slice(0,10),
      promotedBy:me.name,unit:s.unit||'nb'
    };
    PROMOTION_LOG.unshift(newPromo);
    if(s.journey){
      s.journey.forEach(j=>{if(j.current)j.current=false;});
      const ord=s.deg===1?'1st':s.deg===2?'2nd':s.deg===3?'3rd':s.deg+'th';
      // "degree" on black belt, "stripe" on every other colour.
      const unit=s.belt==='black'?' degree':' stripe';
      s.journey.push({belt:s.belt,label:ord+unit,date:new Date().toISOString().slice(0,10),classes:s.total,done:true,current:true,auto:true});
    }
  }
  render();
  if(s._dbId){
    const unit=UNITS.find(u=>u.id===newPromo.unit);
    withSb(c=>c.from('promotions').insert({
      legacy_id:newPromo.id,student_id:s._dbId,
      from_belt:newPromo.fromBelt,to_belt:newPromo.toBelt,
      from_deg:newPromo.fromDeg,to_deg:newPromo.toDeg,
      type:newPromo.isNewBelt?'belt':'stripe',is_new_belt:newPromo.isNewBelt,
      date:newPromo.date,student_name:newPromo.studentName,
      promoted_by_name:newPromo.promotedBy,unit_id:unit&&unit._dbId
    }),'insert promotion');
    withSb(c=>c.from('students').update({
      belt:s.belt,degree:s.deg,grade:s.grade,gi_grade:s.giGrade,journey:s.journey||[]
    }).eq('id',s._dbId),'update student after promotion');
  }
}

// rJnySection renders the Journey block inside rStuProf / rStaffProf.
// `sidKey` is what S.jnyEditFor / addJny / editJnyMilestone use to
// resolve the target back via getJnyTarget(sidKey):
//   - for students: just the legacy id, e.g. 'fwb'
//   - for staff:    'staff:<legacy_id>', e.g. 'staff:mario'
// Owner-only edit affordance for staff; owner/professor for students
// (matches the existing canEditClassCounts gate).
function rJnySection(s,sidKey){
  sidKey=sidKey||s.id;
  const canEdit=canEditClassCounts();
  const isEditing=!!(canEdit&&S.jnyEditFor===sidKey);
  const dirty=isEditing&&jnyHasChanges(s);
  if(!isEditing){
    const editBtn=canEdit
      ? '<button onclick="openJnyEdit(\''+sidKey+'\')" title="Edit journey" style="background:none;border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:11px;letter-spacing:.5px;color:#1A5DAD;cursor:pointer">Edit</button>'
      : '';
    // Staff journeys don't get the per-milestone Share button — the
    // shareJourneyEntry handler is keyed to STUDENTS legacy ids and
    // would 404 for instructors. Pass null shareSid for the staff
    // sidKey ('staff:<id>') so rTL skips the share affordance.
    const isStaffJourney=sidKey&&sidKey.indexOf('staff:')===0;
    return '<div class="slbl" style="display:flex;align-items:center;justify-content:space-between"><span>Journey</span>'+editBtn+'</div>'
      +'<div class="card" style="padding:12px 16px">'+rTL(s.journey,isStaffJourney?null:s.id)+'</div>';
  }
  // Editing mode — replace timeline with a row list per milestone.
  const j=s.journey||[];
  const rows=j.length?j.map((m,i)=>{
    const isFut=!m.done;
    const isCur=!!m.current;
    const bl=BA[m.belt]||BK[m.belt]||BA.white;
    const beltDot='<div style="width:26px;height:26px;border-radius:50%;background:'+bl.bg+';color:'+bl.fg+';display:flex;align-items:center;justify-content:center;font-family:Barlow Condensed,sans-serif;font-size:9px;font-weight:700;flex-shrink:0">'+((m.belt||'·').charAt(0).toUpperCase())+'</div>';
    const subParts=[];
    if(m.date)subParts.push(m.date);
    if(m.classes!=null)subParts.push(m.classes+' classes');
    if(isCur)subParts.push('current');
    if(isFut)subParts.push('pending');
    const sub=subParts.join(' · ');
    const editIcon='<button onclick="editJnyMilestone(\''+sidKey+'\','+i+')" title="Edit" style="background:none;border:1px solid var(--border);border-radius:6px;width:30px;height:30px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>';
    const delIcon='<button onclick="delJnyMilestone(\''+sidKey+'\','+i+')" title="Delete" style="background:none;border:1px solid var(--red-border);border-radius:6px;width:30px;height:30px;cursor:pointer;color:var(--red-text);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>';
    return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);opacity:'+(isFut?'.55':'1')+'">'
      +beltDot
      +'<div style="flex:1;min-width:0"><div style="font-size:13px;color:var(--text);font-weight:600;overflow:hidden;text-overflow:ellipsis">'+(m.label||'—')+'</div>'
      +(sub?'<div style="font-size:11px;color:var(--text3);margin-top:1px">'+sub+'</div>':'')
      +(m.notes?'<div style="font-size:11px;color:var(--text3);font-style:italic;margin-top:2px;overflow:hidden;text-overflow:ellipsis">'+m.notes+'</div>':'')
      +'</div>'
      +editIcon+delIcon
    +'</div>';
  }).join(''):'<div style="padding:18px 0;text-align:center;color:var(--text3);font-size:13px">No milestones yet.</div>';
  const addBtn='<div style="padding:12px 0;text-align:center"><button onclick="addJny(\''+sidKey+'\')" style="background:none;border:1px dashed var(--border2);border-radius:8px;padding:8px 16px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:11px;letter-spacing:.5px;color:#1A5DAD;cursor:pointer">+ Add milestone</button></div>';
  const status=dirty
    ? '<span style="color:var(--amber-text);font-weight:700">Unsaved changes</span>'
    : '<span style="color:var(--text3)">No changes yet</span>';
  return '<div class="slbl" style="display:flex;align-items:center;justify-content:space-between"><span>Journey · editing</span>'+status+'</div>'
    +'<div class="card" style="padding:6px 14px">'+rows+addBtn+'</div>'
    +'<div style="display:flex;gap:10px;margin-top:10px">'
      +'<button class="bsm" style="flex:1;padding:12px;border-radius:10px;font-size:14px" onclick="cancelJnyEdit()">Cancel</button>'
      +'<button class="bblue" style="flex:1;padding:12px'+(dirty?'':';opacity:.5;pointer-events:none')+'" onclick="saveJnyEdit()">Save changes</button>'
    +'</div>'
    +'<div style="margin-top:8px;font-size:11px;color:var(--text3);line-height:1.45">Editing journey doesn’t change the student’s current belt or grade. Use Promote / Demote for that.</div>';
}

// Attendance history block on rStuProf. Renders the last ~20 rows for
// this student from the in-memory ATTENDANCE window (±21d). Each row
// shows the date / time / class type / status pill, and — for present
// or absent rows — a "Confirmed by Prof. X on <date>" trail when we
// can resolve the confirming staff via their user_id. Visible to all
// roles who can see the profile.
function rAttHistory(s,canAdminView){
  if(!s||!s._dbId)return '';
  const rows=ATTENDANCE
    .filter(a=>a.studentDbId===s._dbId&&(a.status==='present'||a.status==='absent'||a.status==='going'))
    .sort((a,b)=>(b.classDate+'_'+b.classTime).localeCompare(a.classDate+'_'+a.classTime))
    .slice(0,20);
  if(!rows.length){
    return '<div class="slbl" style="margin-top:18px">Attendance log</div>'
      +'<div class="card" style="padding:14px;text-align:center;font-size:12px;color:var(--text3)">No attendance recorded in the last 21 days.</div>';
  }
  const staffNameByUid=uid=>{
    if(!uid)return null;
    const sf=STAFF.find(x=>x._userId===uid);
    if(!sf)return null;
    return instructorTitle(sf.belt||'white',sf.deg||0,sf.role)+' '+(sf.name||'').split(' ')[0];
  };
  const pill=st=>{
    if(st==='present')return '<span style="font-size:10px;font-family:Barlow Condensed,sans-serif;font-weight:700;letter-spacing:.5px;color:var(--green-text);background:var(--green-bg);border:1px solid var(--green-border);padding:1px 6px;border-radius:4px">PRESENT</span>';
    if(st==='absent') return '<span style="font-size:10px;font-family:Barlow Condensed,sans-serif;font-weight:700;letter-spacing:.5px;color:var(--red-text);background:var(--red-bg);border:1px solid var(--red-border);padding:1px 6px;border-radius:4px">ABSENT</span>';
    return '<span style="font-size:10px;font-family:Barlow Condensed,sans-serif;font-weight:700;letter-spacing:.5px;color:var(--text3);background:var(--bg);border:1px solid var(--border);padding:1px 6px;border-radius:4px">GOING</span>';
  };
  return '<div class="slbl" style="margin-top:18px">Attendance log</div>'
    +'<div class="card" style="padding:2px 14px">'
    +rows.map((r,i)=>{
      const last=i===rows.length-1;
      const ins=staffNameByUid(r.confirmedBy);
      const when=r.confirmedAt?new Date(r.confirmedAt).toLocaleDateString('en-AU',{day:'numeric',month:'short'}):null;
      let trail='';
      if(r.status==='present'&&ins)trail='Confirmed by '+ins+(when?' on '+when:'');
      else if(r.status==='absent'&&ins)trail='Marked absent by '+ins+(when?' on '+when:'');
      else if(r.status==='going')trail='Awaiting confirmation';
      const ctLabel=r.classType||'class';
      return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0'+(last?'':';border-bottom:1px solid var(--border)')+'">'
        +'<div style="flex:1;min-width:0"><div style="font-size:13px;color:var(--text);font-weight:500">'+r.classDate+' · '+r.classTime+' <span style="font-size:11px;color:var(--text3);font-weight:400">· '+ctLabel+'</span></div>'
        +(trail?'<div style="font-size:11px;color:var(--text3);margin-top:2px">'+trail+'</div>':'')
        +'</div>'
        +pill(r.status)
      +'</div>';
    }).join('')
    +'</div>';
}

// Cache reconcile badge — admin / professor only. Compares the cached
// students.total against the count of 'present' rows in ATTENDANCE for
// this student. Same number means the cache is correct; mismatch
// triggers a manual recompute_student_stats call so the next render
// reflects reality. Belt-and-suspenders behind the DB trigger.
function rReconcileBadge(s){
  if(!s||!s._dbId)return '';
  const presentCount=ATTENDANCE.filter(a=>a.studentDbId===s._dbId&&a.status==='present').length;
  // The cached total is global (all-time); ATTENDANCE only holds a
  // recent window. So we only flag mismatch when present-rows > cached
  // total (cache is provably stale). Equal or fewer is consistent
  // with truncation.
  const mismatch=presentCount>(s.total||0);
  if(!mismatch){
    return '<div style="margin-top:8px;font-size:10px;color:var(--text3);font-family:Barlow Condensed,sans-serif;letter-spacing:.5px;text-align:center">Cache OK · '+(s.total||0)+' total / '+presentCount+' confirmed in last 21d</div>';
  }
  // Fire-and-forget recompute. The badge will refresh on the next render.
  refreshStudentStats(s._dbId);
  return '<div style="margin-top:8px;padding:6px 10px;background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:6px;font-size:11px;color:var(--amber-text);text-align:center">Cache mismatch detected, refreshing…</div>';
}

function rPromoteModal(){
  if(!S.promoteFor)return '';

  const me=S.me;
  const instrBelt=me.belt||'white';const instrDeg=me.deg||0;

  const curIdx=ORDER.indexOf(s.belt);
  const nextBelt=curIdx<ORDER.length-1?ORDER[curIdx+1]:null;

  const canAddStripe=s.deg<maxDeg;

    +'<div style="flex:1;min-width:0"><div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:14px;color:var(--text)">'+label+'</div><div style="font-size:11px;color:var(--text3);margin-top:2px">'+sub+'</div></div>'
    +(disabled
      ?(reason?'<div style="font-size:11px;color:var(--red-text);text-align:right;max-width:160px;margin-left:10px">'+reason+'</div>':'')
      :'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1A5DAD" stroke-width="2.5" style="flex-shrink:0;margin-left:10px"><polyline points="9 18 15 12 9 6"/></svg>')
    +'</button>';

  const stripeRow=isBlack
    ?''

  const beltRow=(isBlack||!nextBelt)

function rJnyEditor(){
  const{sid,idx,isNew}=S.editJny;const s=getJnyTarget(sid);if(!s)return '';
  const m=isNew?{label:'',date:'',classes:'',belt:'',xfer:false,type:'',notes:'',auto:false}:(s.journey[idx]||{});
  const isAuto=!!m.auto;
  const types=[
    {v:'belt',  l:'Belt promotion'},
    {v:'stripe',l:'Stripe promotion'},
    {v:'xfer',  l:'Transfer from another academy'},
    {v:'return',l:'Returning after time away'},
    {v:'comp',  l:'Competition / Achievement'},
    {v:'custom',l:'Custom'},
  ];
  const beltKeys=Array.from(new Set([...Object.keys(BA),...Object.keys(BK)]));
  const beltLabel=(k)=>(BA[k]||BK[k]||{label:k}).label;
  const inferredType=m.type||(m.xfer?'xfer':'');
  const esc=(v)=>String(v==null?'':v).replace(/"/g,'&quot;');
  // For new entries, default Date to today and Belt to the target's
  // current belt — admins usually log "what just happened" so the
  // defaults match that bias.
  const todayISO=new Date().toISOString().slice(0,10);
  // Normalize stored date for the date input: only feeds it valid
  // YYYY-MM-DD; legacy "Mon YYYY" strings stay empty so the user
  // re-picks (rare; only happens when editing a pre-ISO entry).
  const dateValue=(()=>{
    if(isNew)return todayISO;
    const s2=String(m.date||'');

// Auto-suggest the Label when the admin picks a Type or changes the Belt
// inside the milestone modal. Only writes the suggestion if the Label
// field is empty so user-edited text is never clobbered.
function jnyTypeChange(){
  const labelEl=document.getElementById('jm-lbl');
  if(!labelEl||labelEl.value.trim())return;
  const t=(document.getElementById('jm-type')||{}).value||'';
  const b=(document.getElementById('jm-belt')||{}).value||'';
  const bl=(BA[b]||BK[b]||{label:b}).label||'';
  let suggested='';
  if(t==='belt')        suggested=bl+' belt';
  else if(t==='stripe') suggested=b==='black'?'1st degree':'1st stripe';
  else if(t==='xfer')   suggested='Transferred from …';
  else if(t==='return') suggested='Returning student';
  else if(t==='comp')   suggested='Competition: ';
  if(suggested)labelEl.value=suggested;
}

function rClass(){
  const days=bdays();const sk=dk(S.selDay||TODAY);const sd=days.find(d=>dk(d)===sk)||TODAY;const cls=getDC(sd);const isT=sk===dk(TODAY);const hol=isHol(sd);const me=S.me;
  // Current Sydney-local minute-of-day via Intl.DateTimeFormat. The
  // previous implementation built a Date from toLocaleString('en-AU')
  // which returns DD/MM/YYYY — new Date() then parsed it as Invalid
  // and every comparison fell to NaN.
  const _now=(()=>{
    if(!isT)return null;
    const parts=new Intl.DateTimeFormat('en-US',{timeZone:'Australia/Sydney',hour:'2-digit',minute:'2-digit',hour12:false}).formatToParts(new Date());
    const h=+(parts.find(p=>p.type==='hour')||{}).value||0;
    const m=+(parts.find(p=>p.type==='minute')||{}).value||0;
    return h*60+m;
  })();
  const _fmtHHMM=(mins)=>{
    const hh=Math.floor(((mins%1440)+1440)%1440/60);
    const mm=((mins%60)+60)%60;
    return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
  };
  return `${rDayStrip()}${rMonthPromos()}<div style="height:10px"></div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div class="slbl" style="margin-bottom:0">${isT?'Today':fd(sd)}</div></div>
  ${hol?`<div style="background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:4px"><div style="font-size:26px">🏖️</div><div><div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:var(--amber-text)">${HN[sk]||'Public Holiday'}</div><div style="font-size:12px;color:var(--amber-text);opacity:.8;margin-top:3px">Academy closed · No classes scheduled today</div></div></div>`
  :cls.length===0?`<div class="card" style="text-align:center;padding:28px 16px"><div style="font-size:14px;color:var(--text2)">No classes scheduled</div></div>`
  :cls.map(c=>{
    const t=CT.find(x=>x.id===c.type)||CT[0];
    const rows=attendanceFor(c.date,c.time);
    const myStu=myStudentRow();
    const myRow=myStu?rows.find(r=>r.studentDbId===myStu._dbId):null;
    const isIn=!!myRow&&(myRow.status==='going'||myRow.status==='present');
    const isCf=!!myRow&&myRow.status==='present';
    const all=rows.filter(r=>r.status==='going'||r.status==='present').map(r=>{const s=STUDENTS.find(x=>x._dbId===r.studentDbId);return s?s.id:null;}).filter(Boolean);
    // Owners and instructors are also staff viewers — they should see the
    // "N going" indicator, not a check-in button. Previously this was
    // gated on me.role==='admin' only, so owner-role users fell through
    // to the check-in path and saw confusing "Opens at HH:MM" tiles on
    // every class.
    const isStudentAdmin=me.role==='admin'&&!!myStu;
    const isStaffViewer=(me.role==='admin'||me.role==='owner')&&!isStudentAdmin;
    // Per-row window check (today only). Check-in opens 30 min before
    // start and stays open until 60 min after end. Outside that window
    // the row still renders — we just swap the action button for an
    // "Opens at HH:MM" or "Class ended" status.
    const [_ch,_cm]=c.time.split(':').map(Number);
    const startMin=_ch*60+_cm;
    const endMin=startMin+(c.dur||60);
    const isPreopen=isT&&_now!=null&&_now<startMin-30;
    const isEnded=isT&&_now!=null&&_now>endMin+60;
    let cc='card';let btn='';
    if(isStaffViewer){btn=`<div style="font-size:11px;color:var(--blue);font-family:'Barlow Condensed',sans-serif;font-weight:700">${all.length} going</div>`;}
    else if(isCf){cc='card stc';btn=`<button class="bconf"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Present</button>`;}
    else if(isIn){cc='card stp';btn=`<button class="bpend" onclick="undoCI('${c.id}')"><div style="font-size:13px;font-weight:700">Checked in</div><div style="font-size:10px;font-weight:400;opacity:.75;margin-top:2px">Awaiting confirmation</div></button><div style="text-align:center;font-size:10px;color:var(--text3);margin-top:5px;cursor:pointer" onclick="undoCI('${c.id}')">undo</div>`;}
    else if(isEnded){btn=`<button disabled style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:var(--text3);cursor:default;width:100%">Class ended</button>`;}
    else if(isPreopen){btn=`<button disabled style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:var(--text3);cursor:default;width:100%;line-height:1.2"><div>Opens at</div><div style="font-size:14px;color:var(--text2);margin-top:2px">${_fmtHHMM(startMin-30)}</div></button>`;}
    else{btn=`<button class="bblue" onclick="doCI('${c.id}')">I'm going</button>`;}
    const attBlock=isStaffViewer?rAttsStaff(rows,c.id):rAtts(all,c.id);
    return `<div class="${cc}"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px"><div><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><div style="font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--text);line-height:1">${c.time}</div>${ct(c.type)}</div><div style="font-size:13px;color:var(--text2);margin-bottom:2px">${c.ins}</div><div style="font-size:11px;color:var(--text3)">${c.dur}min · ${c.aud} · ${all.length} going</div></div><div style="flex-shrink:0;padding-top:4px;min-width:96px">${btn}</div></div>${attBlock}${isIn&&!isCf&&(me.role==='student'||isStudentAdmin)?`<div class="tnote"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex-shrink:0;margin-top:1px;color:var(--amber)"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div class="tnote-t">Checked in. Only instructor-confirmed attendance counts toward your progress.</div></div>`:''}</div>`;}).join('')}
  <div style="height:16px"></div>`;}

  const body=ptab==='journey'?journeyCard:ptab==='attendance'?attendanceCard:ptab==='wall'?wallCard:rankCard;
  return '<div style="height:16px"></div>'+switcher+header
    +'<div class="stabs">'
    +'<button class="stab '+(ptab==='rank'?'active':'')+'" onclick="setPtab(\'rank\')">Rank</button>'
    +'<button class="stab '+(ptab==='journey'?'active':'')+'" onclick="setPtab(\'journey\')">Journey</button>'
    +'<button class="stab '+(ptab==='attendance'?'active':'')+'" onclick="setPtab(\'attendance\')">Attendance</button>'
    +'<button class="stab '+(ptab==='wall'?'active':'')+'" onclick="setPtab(\'wall\')">Wall</button>'
    +'</div>'
    +body
    +'<div style="height:24px"></div>';
}

// rParentAttendance — child class history within the hydrated ±21d
// window. Each row shows date / time / class type / status pill, with
// the "Confirmed by Prof. X on <date>" trail when the row is present
// or absent. Sorted desc by date+time.
function rParentAttendance(child){
  if(!child||!child._dbId){
    return '<div class="card" style="padding:14px;text-align:center;font-size:12px;color:var(--text3)">No child selected.</div>';
  }
  const rows=ATTENDANCE.filter(a=>a.studentDbId===child._dbId)
    .sort((a,b)=>(b.classDate+'_'+b.classTime).localeCompare(a.classDate+'_'+a.classTime));
  if(!rows.length){
    return '<div class="card" style="padding:14px;text-align:center;font-size:13px;color:var(--text3)">'
      +'No attendance recorded yet. Once '+child.name.split(' ')[0]+' checks in to classes you\'ll see them here.'
      +'</div>';
  }
  const staffNameByUid=uid=>{
    if(!uid)return null;
    const sf=STAFF.find(x=>x._userId===uid);
    if(!sf)return null;
    return instructorTitle(sf.belt||'white',sf.deg||0,sf.role)+' '+(sf.name||'').split(' ')[0];
  };
  const pill=st=>{
    if(st==='present')return '<span style="font-size:10px;font-family:Barlow Condensed,sans-serif;font-weight:700;letter-spacing:.5px;color:var(--green-text);background:var(--green-bg);border:1px solid var(--green-border);padding:1px 6px;border-radius:4px">PRESENT</span>';
    if(st==='absent') return '<span style="font-size:10px;font-family:Barlow Condensed,sans-serif;font-weight:700;letter-spacing:.5px;color:var(--red-text);background:var(--red-bg);border:1px solid var(--red-border);padding:1px 6px;border-radius:4px">ABSENT</span>';
    return '<span style="font-size:10px;font-family:Barlow Condensed,sans-serif;font-weight:700;letter-spacing:.5px;color:var(--text3);background:var(--bg);border:1px solid var(--border);padding:1px 6px;border-radius:4px">GOING</span>';
  };
  return '<div class="card" style="padding:2px 14px">'
    +rows.map((r,i)=>{
      const last=i===rows.length-1;
      const ins=staffNameByUid(r.confirmedBy);
      const when=r.confirmedAt?new Date(r.confirmedAt).toLocaleDateString('en-AU',{day:'numeric',month:'short'}):null;
      let trail='';
      if(r.status==='present'&&ins) trail='Confirmed by '+ins+(when?' on '+when:'');
      else if(r.status==='absent'&&ins) trail='Marked absent by '+ins+(when?' on '+when:'');
      else if(r.status==='going') trail='Checked in — awaiting confirmation';
      const ctLabel=r.classType||'class';
      return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0'+(last?'':';border-bottom:1px solid var(--border)')+'">'
        +'<div style="flex:1;min-width:0"><div style="font-size:13px;color:var(--text);font-weight:500">'+r.classDate+' · '+r.classTime+' <span style="font-size:11px;color:var(--text3);font-weight:400">· '+ctLabel+'</span></div>'
        +(trail?'<div style="font-size:11px;color:var(--text3);margin-top:2px">'+trail+'</div>':'')
        +'</div>'
        +pill(r.status)
      +'</div>';
    }).join('')
    +'</div>';
}

function rMembers(){
  // Parents get a different lens: only see other kids in the same unit,
  // never adults, never their own children. Privacy-first peer view —
  // first name + nickname + belt only, no contact info.
  if(isParent())return rParentMembers();
  const curU=UNITS.find(u=>u.name===S.unit);
  const curUnit=curU?curU.id:null;
  const canSeeKids=isOwner()||isProfessor()||isCoach();
  const segment=canSeeKids?(S.membersSegment||'adult'):'adult';
  const beltsAdult=['white','blue','purple','brown','black'];
  const beltsKids=['grey','yellow','orange','green'];
  const validBelts=segment==='kids'?beltsKids:beltsAdult;
  let beltFilter=S.membersBelt||'all';
  if(beltFilter!=='all'&&!validBelts.includes(beltFilter)){beltFilter='all';S.membersBelt='all';}
  const typeFilter=S.membersType||'all'; // all | students | instructors
  // Build the combined Students + Instructors list. Students filtered
  // by adult/kids segment; instructors only on adult segment (the
  // staff teaching the kids program are the same humans, no point
  // double-listing them under Kids).
  const students=STUDENTS.filter(s=>s._active!==false&&s.unit===curUnit&&s.prog===(segment==='kids'?'kids':'adult')).map(s=>({...s,_kind:'student'}));
  const instructors=segment==='adult'?STAFF.filter(st=>st._active!==false&&st.unit===curUnit).map(st=>({...st,_kind:'instructor'})):[];
  let list=[];
  if(typeFilter==='students')list=students;
  else if(typeFilter==='instructors')list=instructors;
  else list=[...instructors,...students]; // instructors surface first when "All"
  if(beltFilter!=='all')list=list.filter(s=>s.belt===beltFilter);
  // Stable sort: keep instructor section together at top in "All" mode,
  // alphabetical within each section.
  list=list.slice().sort((a,b)=>{
    if(a._kind!==b._kind)return a._kind==='instructor'?-1:1;
    return (a.name||'').localeCompare(b.name||'');
  });
  const segAdultBtn='<div class="rseg '+(segment==='adult'?'active':'')+'" onclick="setMembersSegment(\'adult\')">Adults</div>';
  const segKidsBtn=canSeeKids?'<div class="rseg '+(segment==='kids'?'active':'')+'" onclick="setMembersSegment(\'kids\')">Kids</div>':'';

  const chipBase='border-radius:20px;padding:5px 12px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap;border:1px solid;transition:all .15s';
  const beltChip=(value,label)=>{
    const sel=beltFilter===value;
    return '<button onclick="setMembersBelt(\''+value+'\')" style="'+chipBase+';background:'+(sel?'#1A5DAD15':'transparent')+';border-color:'+(sel?'#1A5DAD':'var(--border)')+';color:'+(sel?'#1A5DAD':'var(--text3)')+'">'+label+'</button>';
  };
  const typeChip=(value,label)=>{
    const sel=typeFilter===value;
    return '<button onclick="setMembersType(\''+value+'\')" style="'+chipBase+';background:'+(sel?'#1A5DAD15':'transparent')+';border-color:'+(sel?'#1A5DAD':'var(--border)')+';color:'+(sel?'#1A5DAD':'var(--text3)')+'">'+label+'</button>';
  };
  const typeChips=segment==='adult'?'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">'+typeChip('all','All')+typeChip('students','Students')+typeChip('instructors','Instructors')+'</div>':'';
  const beltChips='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;min-width:0">'+beltChip('all','All belts')+validBelts.map(b=>beltChip(b,b.charAt(0).toUpperCase()+b.slice(1))).join('')+'</div>';
  const headline='<div style="font-size:13px;color:var(--text2);margin-bottom:12px">Members of '+S.unit+(canSeeKids?' · '+(segment==='kids'?'Kids':'Adults'):'')+' · '+list.length+'</div>';
  if(!list.length)return '<div style="height:16px"></div>'+headline+segHtml+typeChips+beltChips+'<div class="card" style="text-align:center;padding:32px;color:var(--text3);font-size:13px">No members match this filter.</div>';
  const rows=list.map(m=>{
    const isInstr=m._kind==='instructor';
    const av=isInstr?avStaff(m,40):avStu(m,40);
    const tapHandler=isInstr?"viewStaff('"+m.id+"')":"viewStu('"+m.id+"')";
    const subline=isInstr
      ?(instructorTitle(m.belt||'white',m.deg||0,m.role)+(m.nickname?' · '+m.nickname:''))
      :(m.nickname||'');
    const badge=isInstr?'<span style="display:inline-block;font-family:Barlow Condensed,sans-serif;font-size:9px;font-weight:700;color:#1A5DAD;background:var(--blue-tint);border:1px solid var(--blue-mid);letter-spacing:.5px;padding:1px 6px;border-radius:4px;margin-left:6px;vertical-align:1px">INSTRUCTOR</span>':'';
    return '<div class="card" onclick="'+tapHandler+'" style="display:flex;align-items:center;gap:12px;padding:10px 14px;margin-bottom:8px;min-height:60px;overflow:hidden;cursor:pointer">'
      +av
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:16px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+m.name+badge+'</div>'
      +(subline?'<div style="font-size:11px;color:var(--text3);'+(isInstr?'':'font-style:italic;')+'margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+subline+'</div>':'')
      +'</div>'
      +'<div style="flex-shrink:0">'+bb(m.belt,m.deg||0,isInstr?'adult':m.prog)+'</div>'
      +'</div>';
  }).join('');
  return '<div style="height:16px"></div>'+headline+segHtml+typeChips+beltChips+rows;
}

  const unitsLabel=Array.from(myUnits).map(u=>(UNITS.find(x=>x.id===u)||{}).name).filter(Boolean).join(', ');

function rProgress(){
  if(isParent())return rParentChildView();
  var s=S.me;
  // The signed-in user's linked students row, if any. Owners and
  // professors often train as students in their own academy, in which
  // case this is the row that carries their "Joined myBJJ app" /
  // belt-promotion journey. Preferred over staff.journey (which is the
  // instructor career timeline, not personal training) whenever it
  // exists.
  var myStu=(S.profile&&STUDENTS.find(function(x){return x._userId===S.profile.id;}))||null;
  if(s.role==='admin'||s.role==='owner'){
    var staff=STAFF.find(function(x){return x._userId&&S.profile&&x._userId===S.profile.id;})
             ||STAFF.find(function(x){return x.name===s.name;})
             ||null;
    var b=BA[s.belt]||BA.white;
    var isOwner=s.role==='owner';
    if(staff){
      // Instructor with STAFF record — show rank, journey, techniques.
      // If they also have a student row (training in their own academy),
      // surface that row's journey here so personal milestones like
      // "Joined myBJJ app" or stripe promotions land where the user
      // looks for them.
      var sJourney=(myStu&&myStu.journey&&myStu.journey.length?myStu.journey:staff.journey)||[];
      var rankTab='<div class="card"><div class="slbl" style="margin-bottom:10px">Current rank</div>'+bb(s.belt,s.deg||0,'adult')+(isOwner?'':'<div style="font-size:12px;color:var(--text3);margin-top:10px;line-height:1.5">Degree progression is recognised by the Head Professor.</div>')+'</div>';
      var journeyTab='<div class="slbl">My BJJ journey</div><div class="card" style="padding:12px 16px">'+rTL(sJourney)+'</div>';
      var techsTab=rTechniquesLog(s);
      var iContent=S.ptab==='rank'?rankTab:S.ptab==='journey'?journeyTab:S.ptab==='techniques'?techsTab:rPromoWall();
      return '<div style="height:16px"></div><div class="stabs"><button class="stab '+(S.ptab==='rank'?'active':'')+'" onclick="setPtab(\'rank\')">Rank</button><button class="stab '+(S.ptab==='journey'?'active':'')+'" onclick="setPtab(\'journey\')">Journey</button><button class="stab '+(S.ptab==='techniques'?'active':'')+'" onclick="setPtab(\'techniques\')">Techniques</button><button class="stab '+(S.ptab==='wall'?'active':'')+'" onclick="setPtab(\'wall\')">Wall</button></div>'+iContent+'<div style="height:16px"></div>';
    }
    // Coach (admin without STAFF record) — show student-like view.
    // Prefer the user_id link (real DB users); fall back to legacy id
    // match for the dev-shortcut demoLogin path.
    var coachStu=(S.profile&&STUDENTS.find(function(x){return x._userId===S.profile.id;}))
      ||STUDENTS.find(function(x){return x.id===s.id;})
      ||s;
    var bmap=s.prog==='kids'?BK:BA;
    var bc=bmap[s.belt]||BA.white;
    var gg=s.prog==='kids'?GGK:GGA;
    var goal=gg[s.belt]||40;
    var giPct=Math.round((coachStu.grade||0)/goal*100);
    var lbl=nxlbl(s.belt,s.deg,s.prog);

    var cContent=S.ptab==='rank'?rankTab:S.ptab==='journey'?journeyTab:S.ptab==='techniques'?techsTab:S.ptab==='wall'?rPromoWall():feedbackTab;
    return '<div style="height:16px"></div><div class="stabs"><button class="stab '+(S.ptab==='rank'?'active':'')+'" onclick="setPtab(\'rank\')">Rank</button><button class="stab '+(S.ptab==='journey'?'active':'')+'" onclick="setPtab(\'journey\')">Journey</button><button class="stab '+(S.ptab==='techniques'?'active':'')+'" onclick="setPtab(\'techniques\')">Techniques</button><button class="stab '+(S.ptab==='wall'?'active':'')+'" onclick="setPtab(\'wall\')">Wall</button><button class="stab '+(S.ptab==='feedback'?'active':'')+'" onclick="setPtab(\'feedback\')">Feedback</button></div>'+cContent+'<div style="height:16px"></div>';
  }
  // Find the linked students row for this signed-in user. Real users
  // resolve via user_id; the dev demoLogin path leaves S.me.id as the
  // legacy_id, so fall back to that for local testing.
  var stu=(S.profile&&STUDENTS.find(function(x){return x._userId===S.profile.id;}))
    ||STUDENTS.find(function(x){return x.id===s.id;})
    ||s;
  // Use the linked row's belt/prog/grade/total so progress + journey
  // both read from the same source instead of half-falling-back to
  // S.me defaults.
  s={...s,
     belt:stu.belt||s.belt,
     deg:stu.deg!=null?stu.deg:s.deg,
     prog:stu.prog||s.prog,
     grade:stu.grade!=null?stu.grade:s.grade,

16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span style="font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;color:var(--amber-text);letter-spacing:.5px">GI REQUIRED</span></div>'}<div class="gibd"><div class="giseg"><div class="giv" style="color:#1e40af">${s.giTotal}</div><div class="gil">Gi classes</div></div><div class="giseg"><div class="giv" style="color:var(--text2)">${s.total-s.giTotal}</div><div class="gil">No-Gi classes</div></div></div><div class="gnote">${(s.hasGi!==false&&s.giTotal>0)?"Your Gi + No-Gi classes all count toward promotion. Final decision is always the instructor\u2019s.":"Your No-Gi classes are being counted. Once you start attending Gi classes, all your accumulated classes will count toward promotion. Final decision is always the instructor\u2019s."}</div></div>`;

  var journeyTab=`<div class="slbl">Your BJJ journey</div><div class="card" style="padding:12px 16px">${rTL(stu.journey||[])}</div>`;

  var content=S.ptab==='rank'?rankTab:S.ptab==='journey'?journeyTab:S.ptab==='techniques'?techsTab:S.ptab==='wall'?rPromoWall():feedbackTab;

  return `<div style="height:16px"></div><div class="stabs"><button class="stab ${S.ptab==='rank'?'active':''}" onclick="setPtab('rank')">Rank</button><button class="stab ${S.ptab==='journey'?'active':''}" onclick="setPtab('journey')">Journey</button><button class="stab ${S.ptab==='techniques'?'active':''}" onclick="setPtab('techniques')">Techniques</button><button class="stab ${S.ptab==='wall'?'active':''}" onclick="setPtab('wall')">Wall</button><button class="stab ${S.ptab==='feedback'?'active':''}" onclick="setPtab('feedback')">Feedback</button></div>${content}<div style="height:16px"></div>`;

function rPromoWall(){
  const sorted=[...PROMOTION_LOG].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!sorted.length)return '<div class="card" style="text-align:center;padding:28px"><div style="font-size:13px;color:var(--text3)">No promotions recorded yet.</div></div>';
  const byMonth={};
  sorted.forEach(p=>{const d=new Date(p.date);const key=d.toLocaleDateString('en-AU',{month:'long',year:'numeric'});if(!byMonth[key])byMonth[key]=[];byMonth[key].push(p);});
  return Object.entries(byMonth).map(([month,promos])=>{
    const rows=promos.map(p=>{
      const bmap=BA;const b=bmap[p.toBelt]||BA.white;
      const ini=p.studentName.split(' ').map(w=>w[0]).join('').slice(0,2);
      const isBelt=p.isNewBelt;
      const stu=STUDENTS.find(x=>x.id===p.studentId);
      const nickLine=(stu&&stu.nickname)?'<div style="font-size:11px;color:var(--text3);font-style:italic;margin-top:1px">'+stu.nickname+'</div>':'';
      return '<div style="display:flex;align-items:center;gap:12px;padding:10px 0" class="divider">'
        +'<div style="width:38px;height:38px;border-radius:50%;background:'+b.bg+';color:'+b.fg+';display:flex;align-items:center;justify-content:center;font-family:\'Barlow Condensed\',sans-serif;font-weight:700;font-size:13px;flex-shrink:0'+(isBelt?';box-shadow:0 0 0 2.5px '+b.bg+',0 0 0 4.5px var(--card),0 0 0 6px '+b.bg:'')+'">'+ini+'</div>'
        +'<div style="flex:1"><div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:700;font-size:15px;color:var(--text)">'+p.studentName+'</div>'
        +nickLine
        +'<div style="font-size:11px;color:var(--text3);margin-top:1px">'+(isBelt?'Belt promotion':'Stripe')+'&nbsp;·&nbsp;'+p.promotedBy+'</div></div>'
        +(isBelt?'<div>'+bb(p.toBelt,0,'adult')+'</div>':'<div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:700;font-size:12px;color:var(--text3)">+1&nbsp;stripe</div>')
        +'</div>';
    }).join('');
    const hasNewBelt=promos.some(p=>p.isNewBelt);
    return '<div class="slbl" style="display:flex;align-items:center;gap:6px">'+month+(hasNewBelt?'&nbsp;<span style="background:#1A5DAD20;color:#1A5DAD;font-family:Barlow Condensed,sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:4px">BELT PROMO</span>':'')+'</div><div class="card" style="padding:4px 16px">'+rows+'</div>';
  }).join('');
}
function rSchedule(){

    return '<div style="margin-bottom:7px"><div style="background:var(--bg);border-radius:7px;padding:0 11px;display:flex;align-items:center;gap:6px;border:1px solid var(--border);min-height:38px;max-width:100%;overflow:hidden'+(hasVideo&&isA?';border-color:var(--blue-mid)':'')+'"><div title="'+escAttr(tv.t||'')+'" style="flex:1;min-width:0;font-size:12px;color:var(--text);line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(tv.t||'')+'</div>'+linkSibling+editBtn+'</div></div>';
  }

  else if(w){
    const progCols={Fundamentals:'#1A5DAD',Mixed:'#7e22ce',Advanced:'#dc2626',Kids:'#15803d'};
    // Programme badges: only show to admins in view mode (students don't need to know which class type)

    const editBtn=isA?('<button class="bedit" onclick="editW('+w.week+')">Edit</button>'):'';
    const shareWeekBtn=shareBtnHtml('shareWeek('+w.week+')');
    const topWeekActions='<div style="display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;align-self:flex-start">'+(editBtn||'')+shareWeekBtn+'</div>';
    const suRows=(w.standUp||[]).map((t,i)=>techRow(t,i,'standUp')).join('');
    const grRows=(w.ground||[]).map((t,i)=>techRow(t,i,'ground')).join('');

    // Admin edit mode banner
    const editBanner=S.editWeek===w.week?'<div style="background:#1A5DAD15;border:1.5px solid #1A5DAD;border-radius:10px;padding:8px 12px;margin-bottom:12px;font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;color:#1A5DAD;letter-spacing:.5px">✏️ EDITING WEEK '+w.week+' — changes save immediately</div>':'';

    bodyHtml='<div class="card">'
      +editBanner
      +'<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:12px">'
      +'<div style="width:4px;min-height:44px;background:'+w.color+';border-radius:2px;flex-shrink:0;margin-top:2px"></div>'
      +'<div style="flex:1"><div style="font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text3);margin-bottom:2px">WEEK '+w.week+' · PROGRAMME</div>'
      +'<div style="font-family:Bebas Neue,sans-serif;font-size:25px;color:var(--text);line-height:1.05;margin-bottom:'+(badges?'6px':'2px')+'">'+w.theme.toUpperCase()+'</div>'
      +(badges?'<div style="display:flex;gap:4px;flex-wrap:wrap">'+badges+'</div>':'')+'</div>'+topWeekActions+'</div>'
      +(w.notes?'<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-bottom:12px;font-size:12px;color:var(--text2);line-height:1.5;font-style:italic">'+w.notes+'</div>':'')
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;min-width:0">'
      +'<div style="min-width:0"><div style="font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:8px">Stand Up</div>'+suRows+'</div>'
      +'<div style="min-width:0"><div style="font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:8px">Ground</div>'+grRows+'</div>'
      +'</div></div>'
      +(S.editWeek===S.sweek?rWEditor(w):'');
  }
  const evEditor=(S.editEv||S.addEv)?rEEdit():'';
  return '<div style="height:16px"></div><div class="slbl">April 2026 programme \xb7 '+S.unit+'</div>'+tabsHtml+bodyHtml+'<div style="height:16px"></div>'+evEditor;

function evStack(ids){
  const all=[...STUDENTS,...STAFF];
  return ids.slice(0,5).map((id,gi)=>{
    const s=all.find(x=>x.id===id);if(!s)return '';
    const bmap=s.prog==='kids'?BK:BA;const b=bmap[s.belt]||BA.white;

function rEvents(isA){
  const me=S.me.id;
  const curUnit=UNITS.find(u=>u.name===S.unit);
  const curUnitId=curUnit?curUnit.id:'';
  const rows=EVENTS.filter(e=>!e.units||e.units.includes(curUnitId)).map(e=>{
    const isComp=e.type==='competition';
    const typeCol=isComp?'#1A5DAD':'#15803d';
    const typeLbl=isComp?'Competition':'Social';
    const competing=e.competing||[];
    const supporting=e.supporting||[];
    const iComp=competing.includes(me);
    const iSupp=supporting.includes(me);
    const evOpts=e.options||['competing','supporting'];
    const showComp=evOpts.includes('competing');
    const showSupp=evOpts.includes('supporting');
    const compLbl='Competing';
    const suppLbl='Supporting';
    const btnBase='flex:1;border-radius:10px;padding:10px 8px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:13px;cursor:pointer;border:1.5px solid;transition:all .15s;text-align:center';
    const compBtn=showComp?'<button onclick="toggleEv(\''+e.id+'\',\'competing\')" style="'+btnBase+';background:'+(iComp?'#1A5DAD':'transparent')+';color:'+(iComp?'#fff':'#1A5DAD')+';border-color:#1A5DAD">'+(iComp?'\u2713 '+compLbl:compLbl)+'</button>':'';
    const suppBtn=showSupp?'<button onclick="toggleEv(\''+e.id+'\',\'supporting\')" style="'+btnBase+';background:'+(iSupp?'#0f766e20':'transparent')+';color:'+(iSupp?'#0f766e':'var(--text3)')+';border-color:'+(iSupp?'#0f766e':'var(--border)')+'">'+suppLbl+(iSupp?' \u2713':'')+'</button>':'';
    const linkInline=e.link?inlineLinkHtml(e.link,'Register / more info'):'';
    const editBtn=isA?('<button onclick="openEditEv(\''+e.id+'\')" style="background:none;border:none;color:var(--text3);font-size:12px;font-family:Barlow Condensed,sans-serif;font-weight:700;cursor:pointer;letter-spacing:.5px;padding:0">EDIT</button>'):'';

// rARosterListInner is the part of the Roster that depends on S.rq —
// extracted so the search input's oninput handler can replace just
// the results DOM without re-rendering the input itself (which would
// drop focus and eat keystrokes in flight).
function rARosterListInner(){
  const q=(S.rq||'').toLowerCase();
  const curU=UNITS.find(u=>u.name===S.unit);const rfUnit=curU?curU.id:'all';
  const rfBelt=S.rfBelt||'all';
  const rfNear=!!S.rfNear;
  const rfEligible=!!S.rfEligible&&canEditClassCounts();
  const showInactive=!!S.rfInactive;
  // Hide inactive students by default. Toggling the "Show inactive"
  // chip surfaces them; the chip itself lives in the filter row below.
  const base=STUDENTS.filter(s=>showInactive||s._active!==false);
  const allAdults=base.filter(s=>s.prog==='adult');
  const allKids=base.filter(s=>s.prog==='kids');
  let list=S.rseg==='adult'?allAdults:allKids;
  if(rfUnit!=='all')list=list.filter(s=>s.unit===rfUnit);
  if(rfBelt!=='all')list=list.filter(s=>s.belt===rfBelt);
  if(rfNear)list=list.filter(s=>(studentEligibility(s).percent||0)>=80);
  if(rfEligible)list=list.filter(s=>studentEligibility(s).eligible);
  if(q)list=list.filter(s=>s.name.toLowerCase().includes(q));
  list=[...list].sort((a,b)=>{
    const ea=studentEligibility(a),eb=studentEligibility(b);
    const pA=ea.percent==null?-1:ea.percent;
    const pB=eb.percent==null?-1:eb.percent;
    const rankA=ea.eligible?0:pA>=80?1:2;
    const rankB=eb.eligible?0:pB>=80?1:2;
    if(rankA!==rankB)return rankA-rankB;
    return a.name.localeCompare(b.name);
  });
  const hasFilter=rfBelt!=='all'||rfNear||rfEligible||!!q;
  const rows=!hasFilter?'':list.map(s=>{
    const bmap=s.prog==='kids'?BK:BA;
    const b=bmap[s.belt]||BA.white;
    const elig=studentEligibility(s);
    const goal=elig.required;
    const pct=elig.percent==null?0:elig.percent;
    const near=pct>=80;
    const isElig=elig.eligible;
    const lbl=nxlbl(s.belt,s.deg,s.prog);
    const isProm=lbl==='Next promotion';
    const unitName=(UNITS.find(u=>u.id===s.unit)||{name:'—'}).name;
    const giSince=Math.max(s.giGrade||0,0);
    const noGiSince=Math.max((s.grade||0)-giSince,0);
    const noGiOnly=s.hasGi===false;
    const progressLine=goal==null
      ? '<span style="color:var(--text3)">By time only</span>'
      : '<span style="color:'+(near?(isProm?'#111827':'#1A5DAD'):'var(--text2)')+';font-weight:'+(near?600:400)+'">'+(s.grade||0)+'/'+goal+' · '+lbl.toLowerCase()+'</span>'
        +' &nbsp;·&nbsp; <span style="color:var(--text3)">'+s.total+' total</span>';
    const breakdownLine='<div style="font-size:11px;color:var(--text3);margin-top:4px">Gi: '+giSince+' · No-Gi: '+noGiSince+(noGiOnly?' · <span style="color:var(--amber-text)">No-Gi only — Gi required for IBJJF</span>':'')+'</div>';
    const inviteRow=inviteStatusRow(s,s.prog==='kids'?'kidParent':'student');
    return '<div class="card" style="cursor:pointer" onclick="viewStu(this.dataset.sid)" data-sid="'+s.id+'">'
      +'<div class="row" style="margin-bottom:8px;flex-wrap:wrap;gap:6px">'
      +'<div style="display:flex;align-items:center;gap:10px">'+avStu(s,34)
      +'<div><div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:17px;color:var(--text);display:flex;align-items:center;gap:6px">'+(isElig?'<span title="Eligible for promotion" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green-text)"></span>':'')+s.name+'</div>'
      +'<div style="font-size:11px;color:var(--text3);margin-top:1px">'+unitName+' · '+s.prog+'</div></div></div>'
      +bb(s.belt,s.deg||0,s.prog)+'</div>'
      +'<div style="font-size:12px;color:var(--text2);margin-bottom:6px">'+progressLine+'</div>'
      +pbBelt(pct,100,s.belt,s.prog)
      +breakdownLine
      +(isElig?'<div style="font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;color:var(--green-text);margin-top:6px;letter-spacing:.5px">ELIGIBLE FOR NEXT STRIPE</div>':'')
      +inviteRow
      +'</div>';
  }).join('');
  const emptyMsg=!hasFilter
    ?'<div style="padding:40px 16px;text-align:center"><div style="font-size:13px;color:var(--text3);line-height:1.6">Select a belt, toggle Near grad,<br>or search to view students.</div></div>'
    :list.length===0?'<div style="padding:32px;text-align:center;color:var(--text3);font-size:14px">No students match these filters.</div>':'';
  return rows+emptyMsg;
}

function rARoster(){
  const rfBelt=S.rfBelt||'all';
  const rfNear=!!S.rfNear;
  const rfEligible=!!S.rfEligible&&canEditClassCounts();
  const allAdults=STUDENTS.filter(s=>s.prog==='adult');
  const allKids=STUDENTS.filter(s=>s.prog==='kids');
  const beltMap=S.rseg==='adult'?BA:BK;
  const beltOpts=Object.keys(beltMap);
  // Reset stale belt filter when switching segment so we never apply
  // an adult belt to a kids list (or vice-versa).
  if(rfBelt!=='all'&&!beltOpts.includes(rfBelt)){S.rfBelt='all';}

  // Clear button stays in DOM permanently; setRQ toggles display so the
  // input never gets re-created mid-keystroke.
  const clearBtn='<button id="rq-clear" onclick="setRQ(String())" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;'+(S.rq?'':'display:none')+'">×</button>';

  const chipBase='border-radius:20px;padding:5px 12px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap;border:1px solid;transition:all .15s';
  // Fix 7 — belt filter as chip row. First chip "All belts" is the
  // default selection; per-belt chips deselect All and apply that
  // single belt. Mirrors the Members tab pattern.
  const beltChip=(v,lbl)=>{
    const cur=S.rfBelt||'all';
    const sel=cur===v;

// ---------------------------------------------------------------------------
// Role × feature matrix — single source of truth for who sees what
// ---------------------------------------------------------------------------
// Roles:
//   owner       = Head Professor (1 per academy, AME / Prof. Mario)
//   admin       = Professor or Coach (a "staff" row). Professors (black
//                 belt) get the same view; Coaches lose Delete Student.
//   student     = Adult student linked to a public.students row
//   parent      = Linked to one or more kids via students.parent_user_id
//
// Bottom-nav tabs (all defined in TABS below; filtered in rApp):
//   class       → rClass       — every role
//   progress    → rProgress    — every role (parent gets rParentChildView)
//   community   → rMembers     — every role (parent gets rParentMembers)
//   schedule    → rSchedule    — every role
//   admin       → rAdmin       — owner + admin only (renamed "Manage")
//
// Side-panel items:
//   Edit profile / Notification prefs / Set password — every role
//   My unit                                          — every role
//   Send notification / Add student / Manage units   — owner + admin
//                                                      (Manage units = owner)
//   Refresh data                                     — removed; PTR only
//
// Photo edit: ONLY inside Edit profile (self + parent's children block)
// and inside Edit full profile (admin / owner / professor only).
// Removed from rStuProf and rParentChildView.
//
// Parent details:
//   Tab "Classes"   → check-in for selected child (multi-kid switch in
//                     myStudentRow ↔ parentSelectedChild).
//   Tab "Progress"  → rParentChildView with sub-tabs:
//                     Rank / Journey / Attendance / Wall.
//                     Attendance shows status + "Confirmed by Prof. X".
//   Tab "Members"   → rParentMembers — kids only, scoped to child's
//                     unit, excludes own children. Tap → rKidPeer
//                     (first name + belt + class count, no contact info).
//   Tab "Programme" → standard rSchedule view.
//   No "Manage" tab.
//
// Owner-only:
//   Manage staff tab inside Admin
//   Manage units side-panel item
//   Delete student (admin without owner gets no delete affordance)
// ---------------------------------------------------------------------------
const TABS=[{id:'class',label:'Classes',icon:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`},{id:'progress',label:'Progress',icon:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`},{id:'community',label:'Members',icon:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`},{id:'schedule',label:'Programme',icon:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`},{id:'admin',label:'Manage',icon:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2h6a1 1 0 0 1 1 1v2H8V3a1 1 0 0 1 1-1z"/><rect x="5" y="4" width="14" height="18" rx="2"/><path d="M9 13l2 2 4-4"/></svg>`}];

async function sendInvite(dispatch){
  // dispatch: true → Save & invite (fires send-magic-link); false → Save only
  if(dispatch===undefined)dispatch=true;
  const inputs=document.querySelectorAll('.sbody .einput');
  const fname=inputs[0]?inputs[0].value.trim():'';
  const lname=inputs[1]?inputs[1].value.trim():'';
  const email=inputs[2]?inputs[2].value.trim().toLowerCase():'';
  const status=S._addTransfer||'new';
  const isKids=S._addProg==='kids';
  if(!fname||!lname){
    const missing=[];if(!fname)missing.push('first name');if(!lname)missing.push('last name');
    return showSaveToast2('Missing: '+missing.join(', '),'error');
  }
  if(!isKids&&!email)return showSaveToast2('Missing: email','error');
  if(email&&!/^\S+@\S+\.\S+$/.test(email))return showSaveToast2('Please enter a valid email address.','error');
  if(status==='transfer'){
    const fromAcad=document.getElementById('add-from')?.value?.trim()||'';
    if(!fromAcad)return showSaveToast2('Missing: previous academy','error');
  }
  // Kids-specific parent fields. The form always lays them out at indices
  // 5/6/7 (after the 5 base personal fields, before any optional
  // transfer/returning extras), so reading by fixed position is safer
  // than length-N which would shift when transfer/returning fields appear.
  const parentName=isKids&&inputs[5]?inputs[5].value.trim():'';
  const parentPhone=isKids&&inputs[6]?inputs[6].value.trim():'';
  const parentEmail=isKids&&inputs[7]?inputs[7].value.trim().toLowerCase():'';
  if(isKids){
    if(!parentEmail)return showSaveToast2('Parent email is required for kids students.','error');
    if(!/^\S+@\S+\.\S+$/.test(parentEmail))return showSaveToast2('Please enter a valid parent email.','error');
  }
  const curU=UNITS.find(u=>u.name===S.unit);
  const unitLegacy=curU?curU.id:null;
  const unitDbId=meUnitDbId();
  if(!unitLegacy||!unitDbId)return showSaveToast2('Unit not set. Pick a unit first.','error');
  const fullName=(fname+' '+lname).trim();
  const cli=initSupabase();
  if(!cli)return showSaveToast2('Connection issue','error');
  // Bug 7 — Background section. For transfer/returning we seed the
  // student's journey with the appropriate milestone so it shows in
  // their timeline on day one. The same seed_student_journey_if_empty
  // pass that runs on first sign-in will also add the "Joined myBJJ
  // app" milestone — so we deliberately stop short of that here.
  const initialJourney=[];
  if(status==='transfer'){
    const fromAcad=(document.getElementById('add-from')&&document.getElementById('add-from').value||'').trim();
    const sinceVal=document.getElementById('add-since')&&document.getElementById('add-since').value||null;
    initialJourney.push({label:'Transferred to myBJJ',date:sinceVal||new Date().toISOString().slice(0,10),done:true,xfer:true,prev:fromAcad||null,classes:null,belt:null});
  } else if(status==='returning'){
    const leftVal=document.getElementById('add-left')&&document.getElementById('add-left').value||null;
    const reason=document.getElementById('add-reason')&&document.getElementById('add-reason').value||null;
    if(leftVal)initialJourney.push({label:'Left academy'+(reason?(' · '+reason):''),date:leftVal,done:true,classes:null,belt:null});
    initialJourney.push({label:'Returned to myBJJ',date:new Date().toISOString().slice(0,10),done:true,classes:null,belt:null});
  }
  // The address we'll send the magic link to (parent for kids, student otherwise).
  const inviteEmail=isKids?parentEmail:email;
  if(isKids){
    // Uniqueness: parent_email must not equal an existing student.email in this unit
    const dup=await cli.from('students').select('id,full_name').eq('unit_id',unitDbId).eq('email',parentEmail).limit(1);
    if(dup&&dup.data&&dup.data.length){return showSaveToast2("That email already belongs to a student in this unit. Use a different parent email.",'error');}
    const slug=fullName.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')||'kid';
    const legacy=slug+'_k_'+Date.now().toString(36).slice(-4);
    const initials=fullName.split(/\s+/).filter(Boolean).map(p=>p[0]).slice(0,2).join('').toUpperCase()||'KI';

      // create a real students row instead of just leaving the whitelist
      // entry. The first sign-in will then auto-link by email.
      const slug=fullName.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')||'adult';

function render(){
  const app=document.getElementById('app');
  // Preserve scroll position across the innerHTML swap. Without this,
  // every state mutation that re-renders (check-in, mark present,
  // toggle expand, ...) snaps .content back to the top, which is
  // disorienting mid-scroll on long lists.
  let prevScroll=null;
  const prevContent=document.querySelector('.content');
  if(prevContent)prevScroll=prevContent.scrollTop;
  if(S.loggedIn){
    app.innerHTML=rApp();
    if(prevScroll!=null){
      const next=document.querySelector('.content');
      if(next)next.scrollTop=prevScroll;
    }
    requestAnimationFrame(()=>{const el=document.getElementById('dp-'+dk(S.selDay||TODAY));if(el){const strip=el.closest('.dstrip');if(strip){const target=el.offsetLeft-(strip.offsetWidth/2)+(el.offsetWidth/2);strip.scrollTo({left:target,behavior:'smooth'});}}});
    hideSplash();
    initPullToRefresh();
    return;
  }
  if(S.authState==='pending'||S.authState==='rejected'){app.innerHTML=rPending();hideSplash();return;}
  // Still resolving auth — leave the splash up; the in-app "checking"
  // placeholder is what users would see otherwise, and that's an
  // anti-climactic transition from the splash.
  if(S.authState==='checking'){app.innerHTML='<div class="awrap"><div class="abrand"><div class="abrandhead">myBJJ</div><div class="abrandsub">Neutral Bay pilot</div></div></div>';return;}
  app.innerHTML=rAuth();
  hideSplash();
}

function friendlyAuthError(err){
  if(!err) return 'Something went wrong. Please try again or contact your academy admin.';
  let m='';
  if(typeof err==='string') m=err;
  else if(err.message) m=err.message;
  else if(err.error_description) m=err.error_description;
  else if(err.error) m=typeof err.error==='string'?err.error:(err.error.message||'');
  else m=String(err);
  const s=m.toLowerCase();
  if(s.includes('rate limit')||s.includes('over_email_send_rate_limit')||s.includes('too many requests')||s.includes('429')) return 'Too many sign-in attempts. Please wait a few minutes and try again.';
  if(s.includes('invalid email')||s.includes('invalid format')||s.includes('not a valid email')||s.includes('validation_failed')||s.includes('email address')&&s.includes('invalid')) return 'Please enter a valid email address.';
  if(s.includes('user not found')||s.includes('invalid login credentials')||s.includes('email not confirmed')||s.includes('not authorized')||s.includes('not allowed')) return "We couldn't sign you in. Check your email or contact your academy admin.";
  if(s.includes('network')||s.includes('failed to fetch')||s.includes('fetch')||s.includes('typeerror: load')||s.includes('offline')||s.includes('econnreset')||s.includes('timeout')) return 'Connection issue. Please try again.';
  return 'Something went wrong. Please try again or contact your academy admin.';
}

async function bootAuth(){
  if(location.hash&&location.hash.indexOf('error')!==-1){
    try{
      const p=new URLSearchParams(location.hash.replace(/^#/,''));
      const ed=p.get('error_description')||p.get('error');
      if(ed){S.authMsg=friendlyAuthError(ed);history.replaceState(null,'',location.pathname+location.search);}
    }catch(_){}
  }
  const c=initSupabase();
  if(!c){S.authState='unauthenticated';render();return;}
  try{
    const{data:{session}}=await c.auth.getSession();
    if(session) await onAuthed(); else {S.authState='unauthenticated';render();}
  }catch(e){console.warn('[mybjj] bootAuth',e);S.authMsg=friendlyAuthError(e);S.authState='unauthenticated';render();}
  c.auth.onAuthStateChange((ev)=>{
    if(ev==='PASSWORD_RECOVERY'){
      // User just clicked a reset-password email. They have a session
      // but we want them to choose a new password before doing
      // anything else. Stash a flag; once onAuthed runs and S.loggedIn
      // is true, the side panel opens straight on the "Set password"
      // sub-panel.
      S.passwordRecovery=true;
      onAuthed();
    }
    else if(ev==='SIGNED_IN') onAuthed();
    else if(ev==='SIGNED_OUT'){S.profile=null;S.me=null;S.loggedIn=false;S.panelOpen=false;S.sub=null;S.inboxOpen=false;S.authState='unauthenticated';S.authEmail='';S.authMsg='';S.passwordRecovery=false;S.authStep=1;S.authHasPassword=false;render();}
  });
}

async function onAuthed(){
  try{
    const c=initSupabase();
    const{data,error}=await c.rpc('claim_profile');
    if(error){console.warn('[mybjj] claim_profile',error.message);S.authState='unauthenticated';S.authMsg=friendlyAuthError(error);render();return;}
    S.profile=data;
    if(data.status==='approved'){
      S.me=meFromProfile(data);S.loggedIn=true;S.authState='authenticated';
      if(S.me.role==='parent')S.tab='progress';
      // If the user arrived via a reset-password link, jump straight
      // into the Set Password sub-panel so they finish the recovery
      // before doing anything else.
      if(S.passwordRecovery){S.panelOpen=true;S.sub='setpwd';}
      render();
      hydrateData();
      return;
    }
    if(data.status==='rejected') S.authState='rejected';
    else S.authState='pending';
    render();
  }catch(e){console.warn('[mybjj] onAuthed',e);S.authMsg=friendlyAuthError(e);S.authState='unauthenticated';render();}
}

async function savePEdit(){

  const nickVal=rawNick||null;
  const isParentEdit=S.me&&S.me.role==='parent';
  let childLegacy=null;
  if(isParentEdit){
    const ch=parentSelectedChild();
    if(ch){childLegacy=ch.id;ch.nickname=nickVal;}
  } else {
    const ownStu=(S.profile&&S.profile.id)?STUDENTS.find(x=>x._userId===S.profile.id):null;
    if(ownStu)ownStu.nickname=nickVal;
    if(linkedStaff)linkedStaff.nickname=nickVal;
    if(S.profile)S.profile.nickname=nickVal;
    S.me.nickname=nickVal;
  }
  showSaveToast2('Profile updated');closeSub();
  if(S.profile&&S.profile.id){
    withSb(c=>c.from('users').update({full_name:full}).eq('id',S.profile.id),'update self full_name');

  if(linkedStaff&&linkedStaff._dbId){
    withSb(c=>c.from('staff').update({full_name:full,initials:newInitials}).eq('id',linkedStaff._dbId),'update self staff name');
  }
  withSb(c=>c.rpc('set_my_nickname',{p_nickname:rawNick,p_child_legacy_id:childLegacy}),'set nickname');
}

function meFromProfile(p){
  const base=p.role==='owner'?AME:(p.role==='admin'||p.role==='instructor')?INSE_FELIPE:SME;
  let r;
  if(p.role==='owner') r='owner';
  else if(p.role==='admin'||p.role==='instructor') r='admin';
  else if(p.role==='parent') r='parent';
  else r='student';
  // Bug 6 — load saved notification preferences into S.notif so toggles
  // persist across sessions. The DB column defaults to {} so first-login
  // users keep the in-app defaults defined in S.
  const prefs=p.notification_preferences||{};
  if(prefs&&typeof prefs==='object'){
    Object.keys(prefs).forEach(k=>{S.notif[k]=!!prefs[k];});
  }
  return Object.assign({},base,{id:p.id,name:p.full_name||p.email,role:r,email:p.email,initials:(p.full_name||p.email||'?').slice(0,2).toUpperCase(),photoUrl:p.photo_url||null});
}

function friendlyMutationError(err){
  if(!err)return 'Something went wrong. Please try again.';
  let m=''; if(typeof err==='string')m=err; else if(err.message)m=err.message; else m=String(err);
  const s=m.toLowerCase();
  if(s.includes('not in whitelist')||s.includes('email not in whitelist')) return "This email isn't authorized yet. Save the email first.";
  if(s.includes('rate limit')||s.includes('too many')||s.includes('429')) return 'Too many invites sent recently. Please wait a few minutes.';

  if(s.includes('non-negative')||s.includes('must be')||s.includes('invalid input')||s.includes('validation')||s.includes('check constraint')) return 'Please check the values and try again.';
  if(s.includes('network')||s.includes('failed to fetch')||s.includes('fetch')||s.includes('timeout')||s.includes('offline')) return 'Connection issue. Please try again.';
  return 'Something went wrong. Please try again.';
}
