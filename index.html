// IBJJF Promotion Authority Rules
// Returns the maximum belt a given instructor belt+degree can promote TO
function maxPromotableBelt(belt, deg){
  const ORDER=['white','blue','purple','brown','black'];
  if(belt==='black' && deg>=2) return 'black';
  if(belt==='black' && deg<2)  return 'brown';   // can promote up to brown
  if(belt==='brown')           return 'purple';  // exception regions only; standard = needs black belt
  if(belt==='purple')          return 'blue';    // exception regions only
  return null; // cannot promote
}

// Check if instructor can award a specific promotion
function canPromote(instructorBelt, instructorDeg, targetBelt, targetDeg, isNewBelt){
  // isNewBelt = true means belt promotion (e.g. white→blue), false = stripe
  const maxBelt = maxPromotableBelt(instructorBelt, instructorDeg);
  if(!maxBelt) return {ok:false, reason:'Not authorized to promote students.'};
  const ORDER=['white','blue','purple','brown','black'];
  const maxIdx = ORDER.indexOf(maxBelt);
  const targetIdx = ORDER.indexOf(targetBelt);
  if(isNewBelt){
    // promoting to targetBelt
    if(targetIdx > maxIdx) return {ok:false, reason:'Requires a '+maxBelt+'-level promotion authority or higher.'};
  } else {
    // adding a stripe to targetBelt
    if(targetIdx > maxIdx) return {ok:false, reason:'Requires a higher-ranked instructor to award stripes at this level.'};
  }
  return {ok:true, reason:null};
}

function av(ini,bg,fg,sz,role){
  sz=sz||32;const fs=Math.round(sz*.34);
  let ring='';
  if(role==='owner')ring='box-shadow:0 0 0 2.5px #dc2626,0 0 0 5px #111827,0 0 0 7px #dc2626;';
  else if(role==='admin'&&bg==='#111827')ring='box-shadow:0 0 0 2.5px #374151,0 0 0 5px rgba(255,255,255,.08);';
  return `<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${bg};color:${fg};display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:${fs}px;flex-shrink:0;${ring}">${ini}</div>`;
}
function beltSVG(belt,deg,prog,width){
  width=width||120;const m=prog==='kids'?BK:BA;const b=m[belt]||BA.white;
  const h2=14;const r=4;const sw=width;const sh=h2*2;
  const tipW=18;const stripeW=6;const stripeGap=4;
  const maxDeg=4;
  // tip color: black for belt, white for white belt
  const tipCol=belt==='black'?'#ffffff':belt==='white'?'#374151':'#111111';
  const tipBg=belt==='white'?'#9ca3af':b.bg;
  let stripes='';
  for(let i=0;i<maxDeg;i++){
    const x=sw-tipW-((i+1)*(stripeW+stripeGap));
    const col=i<deg?(belt==='black'?'#ffffff':'#111827'):'transparent';
    const strokeCol=belt==='black'?'rgba(255,255,255,0.3)':'rgba(0,0,0,0.2)';
    stripes+=`<rect x="${x}" y="2" width="${stripeW}" height="${sh-4}" rx="1" fill="${col}" stroke="${strokeCol}" stroke-width="0.5"/>`;
  }
  const centerKnot=`<rect x="${sw/2-8}" y="1" width="16" height="${sh-2}" rx="2" fill="${belt==='white'?'#d1d5db':belt==='black'?'#374151':'rgba(0,0,0,0.2)'}"/>`;
  return `<svg width="${sw}" height="${sh}" viewBox="0 0 ${sw} ${sh}" style="display:block;border-radius:${r}px;overflow:hidden">
    <rect x="0" y="0" width="${sw}" height="${sh}" rx="${r}" fill="${b.bg}" ${b.bdr?`stroke="#374151" stroke-width="1"`:``}/>
    ${centerKnot}
    <rect x="${sw-tipW}" y="0" width="${tipW}" height="${sh}" rx="0" fill="${tipBg}" opacity="0.7"/>
    <line x1="${sw-tipW}" y1="0" x2="${sw-tipW}" y2="${sh}" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
    ${stripes}
  </svg>`;
}

function rSub(){const ss={'pedit':rPEdit,'nprefs':rNPrefs,'anotify':rANotify,'addstu':rAddStu,'munits':rMUnits,'stuprof':rStuProf,'staffprof':rStaffProf,'addstaff':rAddStaff};return(ss[S.sub]||(() =>''))();}
function rPEdit(){
  var me=S.me;
  var stu=STUDENTS.find(function(x){return x.id===me.id;})||STAFF.find(function(x){return x.name===me.name;})||me;
  var beltInfo=bb(stu.belt||me.belt,stu.deg||me.deg||0,stu.prog||'adult');
  var fn=(me.name||'').split(' ')[0]||'';
  var ln=(me.name||'').split(' ').slice(1).join(' ')||'';
  return `<div class="sub open"><div class="shdr">${BACK}<div class="stitle">Edit Profile</div></div><div class="sbody"><div style="background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:8px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:8px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--amber-text);flex-shrink:0"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg><span style="font-size:12px;color:var(--amber-text);font-weight:500">Editing mode \u2014 changes are saved when you tap Save</span></div><div class="ef"><div style="padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;border-bottom:1px solid var(--border)"><div style="width:72px;height:72px;border-radius:50%;background:#1A5DAD;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:26px">${me.initials}</div>${beltInfo}<div style="font-size:11px;color:var(--text3)">Photo managed by your instructor</div></div><div class="erow"><div class="elbl">First name</div><input class="einput" value="${fn}"/></div><div class="erow"><div class="elbl">Last name</div><input class="einput" value="${ln}"/></div><div class="erow"><div class="elbl">Date of birth</div><input class="einput" type="date" value="1986-09-15"/></div><div class="erow"><div class="elbl">Phone</div><input class="einput" type="tel" value="+61 412 345 678"/></div><div class="erow"><div class="elbl">Weight (kg)</div><input class="einput" type="number" value="79"/></div><div class="erow"><div class="elbl">Height (cm)</div><input class="einput" type="number" value="178"/></div></div><div class="slbl" style="margin-top:8px">Emergency contact</div><div class="ef"><div class="erow"><div class="elbl">Name</div><input class="einput" value="Monica Faraone"/></div><div class="erow"><div class="elbl">Phone</div><input class="einput" type="tel" value="+61 411 222 333"/></div></div><div style="height:16px"></div><button onclick="showSaveToast();closeSub()" class="bblue" style="margin-bottom:24px">Save changes</button></div></div>`;
}

function rNPrefs(){const ps=[{k:'classReminder',t:'Class reminder',s:'2 hours before a confirmed class'},{k:'cancellations',t:'Cancellations',s:'When a class you checked into is cancelled'},{k:'promotions',t:'Promotions & stripes',s:'When your belt or degree changes'},{k:'announcements',t:'Announcements',s:'General messages from the team'},{k:'curriculum',t:'New curriculum',s:'When the weekly schedule is updated'}];return `<div class="sub open"><div class="shdr">${BACK}<div class="stitle">Notifications</div></div><div class="sbody"><div class="card" style="padding:0;overflow:hidden">${ps.map(p=>`<div class="togrow"><div class="toginfo"><div class="togtitle">${p.t}</div><div class="togsub">${p.s}</div></div><button class="toggle ${S.notif[p.k]?'on':''}" onclick="togNotif('${p.k}')"></button></div>`).join('')}</div><div style="height:24px"></div></div></div>`;}
function rANotify(){const grps=[{lbl:'Everyone',opts:[{k:'all',l:'All students'},{k:'adults',l:'Adults only'},{k:'kids',l:'Junior only'}]},{lbl:'By belt',opts:[{k:'white',l:'White belt'},{k:'blue',l:'Blue belt'},{k:'purple',l:'Purple belt'},{k:'grey',l:'Grey (kids)'},{k:'yellow',l:'Yellow (kids)'}]},{lbl:'By context',opts:[{k:'checkedin',l:"Today's check-ins"},{k:'nearpromo',l:'Near promotion (85%+)'},{k:'specific',l:'Specific student'}]}];return `<div class="sub open"><div class="shdr">${BACK}<div class="stitle">Send notification</div></div><div class="sbody">${grps.map(g=>`<div class="slbl">${g.lbl}</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">${g.opts.map(a=>`<div class="achip2 ${S.naud===a.k?'on':''}" onclick="setNAud('${a.k}')">${a.l}</div>`).join('')}</div>`).join('')}${S.naud==='specific'?`<div class="slbl">Select student</div><div class="ef" style="margin-bottom:16px">${STUDENTS.map(s=>`<div class="erow" style="cursor:pointer"><div style="font-size:14px;color:var(--text);flex:1">${s.name}</div></div>`).join('')}</div>`:''}<div class="slbl">Message</div><div class="ef"><div class="erow"><div class="elbl">Title</div><input class="einput" placeholder="e.g. Class cancelled"/></div><textarea class="fbta" style="border-top:1px solid var(--border)" placeholder="Write your message..."></textarea></div><button class="bblue" style="margin-bottom:12px" onclick="sendN()">Send notification</button>${S.nsent?`<div style="background:var(--green-bg);border:1px solid var(--green-border);border-radius:10px;padding:14px;text-align:center"><div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:var(--green-text)">Sent · Push + in-app delivery</div></div>`:''}<div style="height:24px"></div></div></div>`;}
function rAddStu(){

  var ccOptions=[{c:'+61',l:'AU +61'},{c:'+64',l:'NZ +64'},{c:'+81',l:'JP +81'},{c:'+82',l:'KR +82'},{c:'+1',l:'US +1'},{c:'+44',l:'UK +44'},{c:'+55',l:'BR +55'}];

div></div>${isKids?`<div class="slbl" style="margin-top:8px">Parent / Guardian</div><div style="font-size:12px;color:var(--text3);margin-bottom:8px;line-height:1.5">Required for students under 18. The parent/guardian will receive login access to view their child\\u2019s progress.</div><div class="ef"><div class="erow"><div class="elbl">Name</div><input class="einput" placeholder="Parent or guardian full name"/></div><div class="erow"><div class="elbl">Phone</div><div style="display:flex;align-items:center;gap:6px;flex:1"><select style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-family:Barlow,sans-serif;font-size:13px;color:var(--text);outline:none;min-width:72px">${ccOptions.map(o=>`<option value="${o.c}" ${o.c===phoneCC?'selected':''}>${o.l}</option>`).join('')}</select><input class="einput" type="tel" placeholder="4xx xxx xxx" style="text-align:left"/></div></div><div class="erow"><div class="elbl">Email</div><input class="einput" type="email" placeholder="parent@email.com"/></div></div>`:''}<div class="slbl" style="margin-top:8px">Background</div><div class="ef"><div class="erow"><div class="elbl">Status</div><div class="seg"><button class="segb ${isTransfer==='new'?'on':''}" onclick="S._addTransfer='new';render()">New</button><button class="segb ${isTransfer==='transfer'?'on':''}" onclick="S._addTransfer='transfer';render()">Transfer</button><button class="segb ${isTransfer==='returning'?'on':''}" onclick="S._addTransfer='returning';render()">Returning</button></div></div>${isTransfer==='transfer'?`<div class="erow"><div class="elbl">From</div><input class="einput" id="add-from" placeholder="Previous academy name"/></div><div class="erow"><div class="elbl">Since</div><input class="einput" id="add-since" type="date"/></div>`:''}${isTransfer==='returning'?`<div class="erow"><div class="elbl">Left on</div><input class="einput" id="add-left" type="date"/></div><div class="erow"><div class="elbl">Reason</div><select class="e function rMUnits(){
  var CC={AU:"Australia",NZ:"New Zealand",JP:"Japan",KR:"Korea",US:"United States"};
  var FLAG={AU:"\u{1F1E6}\u{1F1FA}",NZ:"\u{1F1F3}\u{1F1FF}",JP:"\u{1F1EF}\u{1F1F5}",KR:"\u{1F1F0}\u{1F1F7}",US:"\u{1F1FA}\u{1F1F8}"};
  var g={};UNITS.forEach(function(u){if(!g[u.country])g[u.country]=[];g[u.country].push(u);});
  var editId=S._editUnit||null;
  var sections="";
  ["AU","NZ","JP","KR","US"].forEach(function(code){
    var list=g[code];if(!list||!list.length)return;
    var cards=list.map(function(u){
      var coming=u.address==="Coming soon";
      var badge=coming?'<span style="font-size:10px;color:#b45309;background:#fef3c7;padding:2px 8px;border-radius:4px;font-family:Barlow Condensed,sans-serif;font-weight:700">Coming soon</span>':(u.active?'<span style="font-size:10px;color:#15803d;background:#15803d20;padding:2px 8px;border-radius:4px;font-family:Barlow Condensed,sans-serif;font-weight:700">Active</span>':'<span style="font-size:10px;color:#9ca3af;background:#9ca3af20;padding:2px 8px;border-radius:4px;font-family:Barlow Condensed,sans-serif;font-weight:700">Inactive</span>');
      var stuCount=STUDENTS.filter(function(s){return s.unit===u.id;}).length;
      var isEdit=editId===u.id;
      if(isEdit){
        var ccOpts=["AU","NZ","JP","KR","US"].map(function(c){return '<option value="'+c+'" '+(c===u.country?'selected':'')+'>'+CC[c]+'</option>';}).join("");
        return '<div class="card" style="padding:12px 14px;margin-bottom:6px;border:2px solid #1A5DAD">'
          +'<div class="ef" style="margin-bottom:8px">'
          +'<div class="erow"><div class="elbl">Name</div><input class="einput" id="eu-name" value="'+u.name+'"/></div>'
          +'<div class="erow"><div class="elbl">City</div><input class="einput" id="eu-city" value="'+u.city+'"/></div>'
          +'<div class="erow"><div class="elbl">Country</div><select class="einput" id="eu-country" style="background:var(--card)">'+ccOpts+'</select></div>'
          +'<div class="erow"><div class="elbl">Address</div><input class="einput" id="eu-addr" value="'+(u.address||'')+'"/></div>'
          +'<div class="erow"><div class="elbl">Status</div><div class="seg"><button class="segb '+(u.active?'on':'')+'" onclick="toggleUnitActive(\''+u.id+'\',true)">Active</button><button class="segb '+(!u.active?'on':'')+'" onclick="toggleUnitActive(\''+u.id+'\',false)">Inactive</button></div></div>'
          +'</div>'
          +'<div style="display:flex;gap:8px">'
          +'<button class="bblue" style="flex:1;padding:10px" onclick="saveEditUnit(\''+u.id+'\')">Save</button>'
          +'<button style="flex:1;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:14px;color:var(--text2);cursor:pointer" onclick="S._editUnit=null;render()">Cancel</button>'
          +'</div></div>';
      }
      return '<div class="card" style="padding:12px 14px;margin-bottom:6px">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'
        +'<div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:16px;color:var(--text)">'+u.name+'</div>'
        +'<div style="display:flex;align-items:center;gap:6px">'+badge
        +'<button onclick="S._editUnit=\''+u.id+'\';render()" style="background:none;border:none;cursor:pointer;padding:2px" title="Edit"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>'
        +'<button onclick="confirmDeleteUnit(\''+u.id+'\',\''+u.name.replace(/'/g,"\\'")+'\')" style="background:none;border:none;cursor:pointer;padding:2px" title="Delete"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>'
        +'</div></div>'
        +'<div style="font-size:12px;color:var(--text3)">'+u.city+(u.address&&u.address!=="Coming soon"?' \u00B7 '+u.address:'')+'</div>'
        +(stuCount?'<div style="font-size:11px;color:var(--text2);margin-top:4px">'+stuCount+' students</div>':'')
        +'</div>';
    }).join("");
    sections+='<div style="margin-bottom:16px"><div style="font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px">'+(FLAG[code]||"")+' '+CC[code]+'</div>'+cards+'</div>';

function doPromote(id, isBeltPromotion){
  const s=STUDENTS.find(x=>x.id===id);if(!s)return;
  const me=S.me;
  const instrBelt=me.belt||'white';const instrDeg=me.deg||0;
  const ORDER_A=['white','blue','purple','brown','black'];
  const ORDER_K=['white','grey','yellow','orange','green'];
  const ORDER=s.prog==='kids'?ORDER_K:ORDER_A;

  if(isBeltPromotion){
    const curIdx=ORDER.indexOf(s.belt);
    if(curIdx>=ORDER.length-1){alert('Already at maximum belt.');return;}
    const nextBelt=ORDER[curIdx+1];
    const chk=canPromote(instrBelt,instrDeg,nextBelt,0,true);
    if(!chk.ok){alert('Not authorized: '+chk.reason);return;}
    const fromBelt=s.belt;const fromDeg=s.deg;
    s.belt=nextBelt;s.deg=0;s.grade=0;s.giGrade=0;
    // Log it
    PROMOTION_LOG.unshift({
      id:'pl'+Date.now(),studentId:s.id,studentName:s.name,
      fromBelt,fromDeg,toBelt:nextBelt,toDeg:0,isNewBelt:true,
      date:new Date().toISOString().slice(0,10),
      promotedBy:me.name,unit:s.unit||'nb'
    });
    // Add to journey
    if(!s.journey)s.journey=[];
    const bl=s.prog==='kids'?BK:BA;
    const nb=bl[nextBelt]||BA.white;
    const doneIdx=s.journey.findLastIndex?s.journey.findLastIndex(j=>j.done):-1;
    if(doneIdx>=0)s.journey[doneIdx].current=false;
    s.journey.push({belt:nextBelt,label:nb.label+' belt',date:new Date().toLocaleDateString('en-AU',{month:'short',year:'numeric'}),classes:s.total,done:true,current:true});
  } else {
    const maxDeg=s.belt==='black'?6:4;
    if(s.deg>=maxDeg){alert('Already at maximum stripes for this belt.');return;}
    const chk=canPromote(instrBelt,instrDeg,s.belt,s.deg,false);
    if(!chk.ok){alert('Not authorized: '+chk.reason);return;}
    const fromDeg=s.deg;
    s.deg+=1;s.grade=0;s.giGrade=0;
    PROMOTION_LOG.unshift({
      id:'pl'+Date.now(),studentId:s.id,studentName:s.name,
      fromBelt:s.belt,fromDeg,toBelt:s.belt,toDeg:s.deg,isNewBelt:false,
      date:new Date().toISOString().slice(0,10),
      promotedBy:me.name,unit:s.unit||'nb'
    });
    // Update journey current milestone
    if(s.journey){
      s.journey.forEach(j=>{if(j.current)j.current=false;});
      s.journey.push({belt:s.belt,label:s.belt.charAt(0).toUpperCase()+s.belt.slice(1)+' — '+s.deg+(s.deg===1?' st':(s.deg===2?' nd':(s.deg===3?' rd':' th')))+' stripe',date:new Date().toLocaleDateString('en-AU',{month:'short',year:'numeric'}),classes:s.total,done:true,current:true});
    }
  }
  render();
}

  return html;
}

function rPromoWall(){
  const sorted=[...PROMOTION_LOG].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!sorted.length)return '<div class="card" style="text-align:center;padding:28px"><div style="font-size:13px;color:var(--text3)">No promotions recorded yet.</div></div>';
  const byMonth={};
  sorted.forEach(p=>{const d=new Date(p.date);const key=d.toLocaleDateString('en-AU',{month:'long',year:'numeric'});if(!byMonth[key])byMonth[key]=[];byMonth[key].push(p);});
  return Object.entries(byMonth).map(([month,promos])=>{
    const rows=promos.map(p=>{
      const bmap=BA;const b=bmap[p.toBelt]||BA.white;
      const ini=p.studentName.split(' ').map(w=>w[0]).join('').slice(0,2);
      const isBelt=p.isNewBelt;
      return '<div style="display:flex;align-items:center;gap:12px;padding:10px 0" class="divider">'
        +'<div style="width:38px;height:38px;border-radius:50%;background:'+b.bg+';color:'+b.fg+';display:flex;align-items:center;justify-content:center;font-family:\'Barlow Condensed\',sans-serif;font-weight:700;font-size:13px;flex-shrink:0'+(isBelt?';box-shadow:0 0 0 2.5px '+b.bg+',0 0 0 4.5px var(--card),0 0 0 6px '+b.bg:'')+'">'+ini+'</div>'
        +'<div style="flex:1"><div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:700;font-size:15px;color:var(--text)">'+p.studentName+'</div>'
        +'<div style="font-size:11px;color:var(--text3);margin-top:1px">'+(isBelt?'Belt promotion':'Stripe')+'&nbsp;·&nbsp;'+p.promotedBy+'</div></div>'
        +(isBelt?'<div>'+bb(p.toBelt,0,'adult')+'</div>':'<div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:700;font-size:12px;color:var(--text3)">+1&nbsp;stripe</div>')
        +'</div>';
    }).join('');
    const hasNewBelt=promos.some(p=>p.isNewBelt);
    return '<div class="slbl" style="display:flex;align-items:center;gap:6px">'+month+(hasNewBelt?'&nbsp;<span style="background:#1A5DAD20;color:#1A5DAD;font-family:Barlow Condensed,sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:4px">BELT PROMO</span>':'')+'</div><div class="card" style="padding:4px 16px">'+rows+'</div>';
  }).join('');
}
function rSchedule(){

function rEvents(isA){
  const curUnit=UNITS.find(u=>u.name===S.unit);
  const curUnitId=curUnit?curUnit.id:'';
  const rows=EVENTS.filter(e=>!e.units||e.units.includes(curUnitId)).map(e=>{

  });

  return rows.join('')+addBtn;
}

function rRecentPromos(){
  const now=new Date('2026-03-31');
  const cutoff=new Date(now);cutoff.setDate(cutoff.getDate()-30);
  const recent=PROMOTION_LOG.filter(p=>{
    const d=new Date(p.date);return d>=cutoff&&d<=now;
  });
  if(!recent.length)return '';
  const cards=recent.map(p=>{
    const s=STUDENTS.find(x=>x.id===p.studentId)||{belt:p.toBelt,deg:p.toDeg,prog:'adult',initials:p.studentName.slice(0,2).toUpperCase()};
    const bmap=s.prog==='kids'?BK:BA;const b=bmap[p.toBelt]||BA.white;
    const dateStr=new Date(p.date).toLocaleDateString('en-AU',{day:'numeric',month:'short'});
    return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">'
      +av(s.initials,b.bg,b.fg,34)
      +'<div style="flex:1"><div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:15px;color:var(--text)">'+p.studentName+'</div>'
      +'<div style="font-size:11px;color:var(--text3);margin-top:1px">'+p.promotedBy+' · '+dateStr+'</div></div>'
      +'<div style="text-align:right">'
      +(p.isNewBelt
        ?(bb(p.fromBelt,p.fromDeg,s.prog)+'<span style="font-size:16px;color:var(--text3);margin:0 4px">→</span>'+bb(p.toBelt,0,s.prog))
        :('<div style="font-size:13px;color:#1A5DAD;font-family:Barlow Condensed,sans-serif;font-weight:700">+1 stripe</div><div style="margin-top:3px">'+bb(p.toBelt,p.toDeg,s.prog)+'</div>'))
      +'</div></div>';
  }).join('');
  return '<div class="slbl" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
    +'<span>Promoted — last 30 days</span>'
    +'<span style="font-family:Barlow,sans-serif;font-weight:400;font-size:11px;color:var(--text3)">'+recent.length+' total</span></div>'
    +'<div class="card" style="padding:0 16px;margin-bottom:20px">'
    +cards.replace(/border-bottom:1px solid var\(--border\)">(?=<\/div>$)/,'">') // remove last border
    +'</div>';
}

function rARoster(){
  const isOwner=S.me.role==='owner';
  const q=(S.rq||'').toLowerCase();
  const curU=UNITS.find(u=>u.name===S.unit);const rfUnit=curU?curU.id:'all';
  const rfBelt=S.rfBelt||'all';
  const rfNear=!!S.rfNear;
  const allAdults=STUDENTS.filter(s=>s.prog==='adult');
  const allKids=STUDENTS.filter(s=>s.prog==='kids');
  let list=S.rseg==='adult'?allAdults:allKids;
  if(rfUnit!=='all')list=list.filter(s=>s.unit===rfUnit);
  if(rfBelt!=='all')list=list.filter(s=>s.belt===rfBelt);
  if(rfNear){
    list=list.filter(s=>{
      const gg=s.prog==='kids'?GGK:GGA;
      const goal=gg[s.belt]||40;
      return Math.round(s.grade/goal*100)>=80;
    });
  }
  if(q)list=list.filter(s=>s.name.toLowerCase().includes(q));
  const activeUnits=UNITS.filter(u=>u.active);
  const beltMap=S.rseg==='adult'?BA:BK;
  const beltOpts=Object.keys(beltMap);

  // Build filter dropdowns using DOM-safe approach
  let unitOpts='<option value="all">All units</option>';
  activeUnits.forEach(u=>{unitOpts+='<option value="'+u.id+'"'+(rfUnit===u.id?' selected':'')+'>'+u.name+', '+u.country+'</option>';});

  let beltOptHtml='<option value="all">Select belt</option>';
  beltOpts.forEach(k=>{beltOptHtml+='<option value="'+k+'"'+(rfBelt===k?' selected':'')+'>'+beltMap[k].label+'</option>';});

  const clearBtn=S.rq?'<button onclick="setRQ(String())" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1">×</button>':'';

  const filterHtml=
    '<div style="display:flex;gap:6px;align-items:center;margin-bottom:10px">'
    +'<select onchange="setRF2(this)" data-key="rfBelt" style="flex:1;min-width:100px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-family:Barlow Condensed,sans-serif;font-weight:600;font-size:12px;color:var(--text2);outline:none">'+beltOptHtml+'</select>'
    +'<button onclick="toggleRFNear()" style="background:'+(rfNear?'#1A5DAD':'var(--card)')+';color:'+(rfNear?'#fff':'var(--text2)')+';border:1px solid '+(rfNear?'#1A5DAD':'var(--border)')+';border-radius:8px;padding:7px 10px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap">Near grad</button>'
    +'</div>'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">'
    +'<div style="flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px">'
    +'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text3);flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'
    +'<input value="'+(S.rq||'')+'" oninput="setRQ(this.value)" placeholder="Search students..." style="flex:1;background:none;border:none;outline:none;font-family:Barlow,sans-serif;font-size:14px;color:var(--text)"/>'
    +clearBtn
    +'</div>'
    +'</div>';

  const rows=list.map(s=>{
    const bmap=s.prog==='kids'?BK:BA;
    const gg=s.prog==='kids'?GGK:GGA;
    const b=bmap[s.belt]||BA.white;
    const goal=gg[s.belt]||40;
    const pct=Math.round(s.grade/goal*100);
    const near=pct>=80;
    const lbl=nxlbl(s.belt,s.deg,s.prog);
    const isProm=lbl==='Next promotion';
    const unitName=(UNITS.find(u=>u.id===s.unit)||{name:'—'}).name;
    return '<div class="card" style="cursor:pointer" onclick="viewStu(this.dataset.sid)" data-sid="'+s.id+'">'
      +'<div class="row" style="margin-bottom:8px;flex-wrap:wrap;gap:6px">'
      +'<div style="display:flex;align-items:center;gap:10px">'+av(s.initials,b.bg,b.fg,34)
      +'<div><div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:17px;color:var(--text)">'+s.name+'</div>'
      +'<div style="font-size:11px;color:var(--text3);margin-top:1px">'+unitName+' · '+s.prog+'</div></div></div>'
      +bb(s.belt,s.deg||0,s.prog)+'</div>'
      +'<div style="font-size:12px;color:var(--text2);margin-bottom:6px">'
      +'<span style="color:'+(near?(isProm?'#111827':'#1A5DAD'):'var(--text2)')+';font-weight:'+(near?600:400)+'">'+s.grade+'/'+goal+' Gi · '+lbl.toLowerCase()+'</span>'
      +' &nbsp;·&nbsp; <span style="color:var(--text3)">'+s.total+' total</span></div>'
      +pbBelt(s.grade,goal,s.belt,s.prog)
      +((pct>=100)?'<div style="font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;color:#1A5DAD;margin-top:6px">READY FOR EVALUATION</div>':'')
      +'</div>';
  }).join('');

  const emptyMsg=list.length===0?'<div style="padding:32px;text-align:center;color:var(--text3);font-size:14px">No students match these filters.</div>':'';
  const totalReg=allAdults.length+allKids.length;
  const regLine='<div style="font-size:12px;color:var(--text3);margin-bottom:8px">'+totalReg+' registered students</div>';
  const seg='<div class="rsw">'+'<div class="rseg '+(S.rseg==="adult"?"active":"")+'" onclick="S.rseg=String.fromCharCode(97,100,117,108,116);render()">Adults ('+allAdults.length+')</div>'+'<div class="rseg '+(S.rseg==="kids"?"active":"")+'" onclick="S.rseg=String.fromCharCode(107,105,100,115);render()">Junior ('+allKids.length+')</div></div>';
  return regLine+seg+rRecentPromos()+filterHtml+rows+emptyMsg;
}

function rManage(){return `<div style="margin-bottom:12px"><div style="font-size:13px;color:var(--text2)">Editing the weekly timetable. Changes apply to all future weeks.</div></div>${[1,2,3,4,5,6,0].map(dow=>{const cls=(TT[dow]||[]).slice().sort((a,b)=>a.time.localeCompare(b.time));return `<div class="dsec"><div class="dhd"><span>${DL[dow]}</span><button style="background:none;border:none;color:#1A5DAD;font-size:12px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;display:flex;align-items:center;gap:4px" onclick="openAddCls(${dow})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add</button></div>${cls.length===0?`<div style="font-size:12px;color:var(--text3);padding:8px 0">No classes.</div>`:''}${cls.map(c=>{const t=CT.find(x=>x.id===c.type)||CT[0];return `<div class="citem"><div class="cit">${c.time}</div><div class="cii"><div class="cin">${t.lbl}</div><div class="cim"><span>${c.ins.replace('Prof. ','')}</span><span>·</span><span>${c.dur}min</span><span>·</span><span class="ctag ${t.tc}" style="font-size:10px;padding:1px 5px">${c.aud}</span></div></div><div style="display:flex;gap:6px"><button class="bedit" onclick="openEditCls('${c.id}',${dow})">Edit</button><button class="bdel" onclick="reqDel('${c.id}',${dow})">✕</button></div></div>`;}).join('')}<button class="badd" onclick="openAddCls(${dow})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add class on ${DL[dow]}</button></div>`;}).join('')}`;}

function rCDel(){const cd=S.cdel;if(!cd)return '';const t=CT.find(x=>x.id===cd.type)||CT[0];return `<div class="cov" onclick="cancelDel()"><div class="csheet" onclick="event.stopPropagation()"><div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;color:var(--text);margin-bottom:8px">Delete class?</div><div style="font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.5">${DL[cd.dow]} at ${cd.time} · ${t.lbl}<br>This will remove it from the timetable permanently.</div><div style="display:flex;gap:10px"><button class="bsm" style="flex:1;padding:13px;border-radius:10px;font-size:15px" onclick="cancelDel()">Cancel</button><button style="flex:1;background:var(--red);color:#fff;border:none;border-radius:10px;padding:13px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;cursor:pointer" onclick="confDel()">Delete</button></div></div></div>`;}

function rCEdit(){const isNew=!S.editCls;const c=S.editCls||{time:'18:00',type:'alev',ins:'Prof. Mario',dur:60,aud:'Adults'};const dow=S.editDow||2;return `<div class="sub open" style="z-index:210"><div class="shdr"><button class="sback" onclick="closeCEdit()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> Back</button><div class="stitle">${isNew?'Add class':'Edit class'}</div><button class="ssave" onclick="saveCls()">Save</button></div><div class="sbody"><div class="ef"><div class="erow"><div class="elbl">Day</div><select class="esel" id="ce-dow">${[1,2,3,4,5,6].map(d=>`<option value="${d}" ${d===dow?'selected':''}>${DL[d]}</option>`).join('')}</select></div><div class="erow"><div class="elbl">Time</div><input class="einput" id="ce-time" type="time" value="${c.time}"/></div><div class="erow"><div class="elbl">Duration</div><select class="esel" id="ce-dur">${[30,45,50,60,90].map(d=>`<option value="${d}" ${d===c.dur?'selected':''}>${d} min</option>`).join('')}</select></div></div><div class="slbl" style="margin-top:8px">Class type</div><div class="ef"><div class="erow" style="flex-wrap:wrap;gap:8px;padding:12px 16px">${CT.map(t=>`<div onclick="setCet('${t.id}')" style="cursor:pointer"><span class="ctag ${t.tc}" style="cursor:pointer;opacity:${(S._cet||c.type)===t.id?'1':'.4'}">${t.lbl}</span></div>`).join('')}</div></div><div class="slbl" style="margin-top:8px">Audience & instructor</div><div class="ef"><div class="erow"><div class="elbl">Audience</div><div class="seg">${AUD.map(a=>`<button class="segb ${(S._cea||c.aud)===a?'on':''}" onclick="setCea('${a}')">${a}</button>`).join('')}</div></div><div class="erow"><div class="elbl">Instructor</div><select class="esel" id="ce-ins">${INS.map(i=>`<option ${i===c.ins?'selected':''}>${i}</option>`).join('')}</select></div></div>${!isNew?`<button class="bdel" style="width:100%;padding:12px;border-radius:10px;font-size:14px;margin function sendInvite(){
  const inputs=document.querySelectorAll('.sbody .einput');
  const fname=inputs[0]?inputs[0].value.trim():'';
  const lname=inputs[1]?inputs[1].value.trim():'';
  const email=inputs[2]?inputs[2].value.trim():'';
  const status=S._addTransfer||'new';
  if(!fname||!lname||!email){
    const missing=[];
    if(!fname)missing.push('first name');
    if(!lname)missing.push('last name');
    if(!email)missing.push('email');
    showSaveToast2('Missing: '+missing.join(', '),'error');return;
  }
  if(status==='transfer'){
    const fromAcad=document.getElementById('add-from')?.value?.trim()||'';
    if(!fromAcad){showSaveToast2('Missing: previous academy','error');return;}
  }
  const label=status==='transfer'?'Transfer from '+(document.getElementById('add-from')?.value||'another academy'):status==='returning'?'Returning student':'New student';
  if(confirm('Send invite to '+fname+' '+lname+' ('+email+')?\n\nStatus: '+label)){
    showSaveToast2('Invite sent to '+fname+' '+lname);closeSub();
  }
}
function showSaveToast2(msg,type){const t=document.createElement('div');const isErr=type==='error';t.innerHTML=(isErr?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:-2px;margin-right:4px"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>':'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:-2px;margin-right:4px"><polyline points="20 6 9 17 4 12"/></svg>')+msg;t.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:'+(isErr?'#DC2626':'#1A5DAD')+';color:#fff;padding:10px 24px;border-radius:10px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:14px;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:opacity .4s;white-space:nowrap';document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),400);},2200);}

function getPromoReady(){
  var ready=[];
  STUDENTS.filter(function(s){return s.unit===UNITS.find(function(u){return u.name===S.unit;})?UNITS.find(function(u){return u.name===S.unit;}).id:'nb';}).forEach(function(s){
    var gg=s.prog==='kids'?GGK:GGA;
    var goal=gg[s.belt]||40;
    var pct=Math.round(s.giGrade/goal*100);
    if(pct>=100){
      var isProm=s.deg>=(MAXD[s.belt]||4);
      ready.push({name:s.name,id:s.id,belt:s.belt,deg:s.deg,pct:pct,giGrade:s.giGrade,goal:goal,isProm:isProm,prog:s.prog});
    }
  });
  return ready.sort(function(a,b){return b.pct-a.pct;});
}
function rPromoAlert(){
  var isA=S.me.role==='admin'||S.me.role==='owner';
  if(!isA||S.evalDismissed)return '';
  var ready=getPromoReady();
  if(ready.length===0)return '';
  var items=ready.slice(0,5).map(function(r){
    var bmap=r.prog==='kids'?BK:BA;
    var b=bmap[r.belt]||BA.white;
    return '<div onclick="S.tab=\'admin\';S.atab=\'roster\';S.viewStu=\''+r.id+'\';S.sub=\'stuprof\';S.panelOpen=true;render()" style="display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer"><div style="width:24px;height:24px;border-radius:50%;background:'+b.bg+';color:'+b.fg+';display:flex;align-items:center;justify-content:center;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:8px">'+r.name.split(' ').map(function(w){return w[0];}).join('')+'</div><div style="flex:1;font-size:13px;color:var(--text)">'+r.name+'</div><div style="font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;color:'+(r.isProm?'var(--text)':'#1A5DAD')+'">'+Math.min(r.pct,100)+'%'+(r.pct>=100?' · EVALUATE':'')+'</div></div>';
  }).join('');
  var moreText=ready.length>5?'<div onclick="S.tab=\'admin\';S.atab=\'roster\';S.rfNear=true;render()" style="font-size:11px;color:#1A5DAD;text-align:center;padding-top:4px;cursor:pointer;font-weight:600">+'+(ready.length-5)+' more in Roster →</div>':'';
  return '<div class="card" style="border-color:var(--amber-border);background:var(--amber-bg);margin-top:12px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div style="display:flex;align-items:center;gap:8px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--amber-text)"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg><div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:14px;color:var(--amber-text)">'+ready.length+' student'+(ready.length>1?'s':'')+' ready for evaluation</div></div><button onclick="S.evalDismissed=true;render()" style="background:none;border:none;cursor:pointer;padding:2px;color:var(--amber-text);opacity:.6;line-height:1"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>'+items+moreText+'</div>';
}

function addUnit(){
  const n=(document.getElementById('nu-name')?.value||'').trim();
  const c=(document.getElementById('nu-city')?.value||'').trim();
  const co=(document.getElementById('nu-country')?.value||'').trim();
  const addr=(document.getElementById('nu-addr')?.value||'').trim();
  if(!n||!c||!co){
    var missing=[];
    if(!n)missing.push('name');if(!c)missing.push('city');if(!co)missing.push('country');
    showSaveToast2('Missing: '+missing.join(', '),'error');return;
  }
  UNITS.push({id:'u'+Date.now(),name:n,city:c,country:co,active:true,address:addr||c});
  showSaveToast2(n+' unit added');render();
}
function saveEditUnit(id){
  var u=UNITS.find(function(x){return x.id===id;});if(!u)return;
  var n=(document.getElementById('eu-name')?.value||'').trim();
  var c=(document.getElementById('eu-city')?.value||'').trim();
  var co=(document.getElementById('eu-country')?.value||'').trim();
  var addr=(document.getElementById('eu-addr')?.value||'').trim();
  if(!n||!c){showSaveToast2('Name and city are required','error');return;}
  u.name=n;u.city=c;u.country=co;u.address=addr||c;
  S._editUnit=null;showSaveToast2(n+' updated');render();
}
function toggleUnitActive(id,val){
  var u=UNITS.find(function(x){return x.id===id;});if(!u)return;
  u.active=val;render();
}
function confirmDeleteUnit(id,name){
  S._deleteConfirm={id:id,name:name,step:1};render();
}
function cancelDeleteUnit(){S._deleteConfirm=null;render();}
function executeDeleteUnit(){
  if(!S._deleteConfirm)return;
  var id=S._deleteConfirm.id;
  var name=S._deleteConfirm.name;
  var stuCount=STUDENTS.filter(function(s){return s.unit===id;}).length;
  if(stuCount>0){showSaveToast2('Cannot delete: '+stuCount+' students assigned','error');S._deleteConfirm=null;render();return;}
  var idx=UNITS.findIndex(function(u){return u.id===id;});
  if(idx>=0)UNITS.splice(idx,1);
  S._deleteConfirm=null;S._editUnit=null;
  showSaveToast2(name+' deleted');render();
}
function rDeleteUnitConfirm(){
  var d=S._deleteConfirm;if(!d)return '';
  var stuCount=STUDENTS.filter(function(s){return s.unit===d.id;}).length;
  return '<div class="cov" onclick="cancelDeleteUnit()" style="align-items:center"><div class="csheet" onclick="event.stopPropagation()" style="border-radius:16px;max-width:340px;margin:0 auto;padding:24px;text-align:center">'
    +'<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="1.5" style="margin-bottom:12px"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
    +'<div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:20px;margin-bottom:8px">Delete '+d.name+'?</div>'
    +'<div style="font-size:13px;color:var(--text2);margin-bottom:6px;line-height:1.5">This action cannot be undone. The unit and all its configuration will be permanently removed.</div>'
    +(stuCount>0?'<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:8px 12px;margin:10px 0;font-size:12px;color:#DC2626;font-weight:600">'+stuCount+' students are assigned to this unit. Reassign them first.</div>':'')
    +'<div style="display:flex;gap:10px;margin-top:16px">'
    +'<button style="flex:1;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:14px;color:var(--text);cursor:pointer" onclick="cancelDeleteUnit()">Cancel</button>'
    +(stuCount>0?'':'<button style="flex:1;padding:12px;background:#DC2626;border:none;border-radius:10px;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:14px;color:#fff;cursor:pointer" onclick="executeDeleteUnit()">Delete permanently</button>')
    +'</div></div></div>';
}

function viewStu(idOrEl){const id=typeof idOrEl==='string'?idOrEl:idOrEl;S.viewStu=id;S.sub='stuprof';S.panelOpen=true;S.addFb=null;S.editJny=null;render();}
function openFb(sid){S.addFb=sid;render();}
function saveFb(sid){const txt=document.getElementById('fb-input')?.value;if(!txt)return;const s=STUDENTS.find(x=>x.id===sid);if(!s)return;if(!s.feedback)s.feedback=[];s.feedback.unshift({ins:'Prof. Mario',date:'Apr 2026',text:txt});S.addFb=null;render();}
function addJny(sid){S.editJny={sid,idx:null,isNew:true};render();}
function getJnyTarget(sid){
  if(sid.startsWith('staff:')){const id=sid.replace('staff:','');const s=STAFF.find(x=>x.id===id);return s;}
  return STUDENTS.find(x=>x.id===sid);
}
function closeJny(){S.editJny=null;render();}
function saveJny(){if(!S.editJny)return;const{sid,idx,isNew}=S.editJny;const s=getJnyTarget(sid);if(!s)return;const lbl=document.getElementById('jm-lbl')?.value||'';const date=document.getElementById('jm-date')?.value||'';const clsv=document.getElementById('jm-cls')?.value;const belt=document.getElementById('jm-belt')?.value||'white';const xfer=document.getElementById('jm-xfer')?.classList.contains('on')||false;const nm={label:lbl,date,classes:clsv?parseInt(clsv):null,belt,done:true,xfer};if(isNew){if(!s.journey)s.journey=[];const fi=s.journey.findIndex(m=>!m.done);fi>=0?s.journey.splice(fi,0,nm):s.journey.push(nm);}else{s.journey[idx]={...s.journey[idx],...nm};}S.editJny=null;render();}
function openAddCls(dow){S.addCls=true;S.editCls=null;S.editDow=dow;S._cet=null;S._cea=null;render();}
function openEditCls(cid,dow){const c=(TT[dow]||[]).find(x=>x.id===cid);if(!c)return;S.editCls={...c};S.editDow=dow;S.addCls=false;S._cet=c.type;S._cea=c.aud;render();}
function closeCEdit(){S.editCls=null;S.addCls=false;S._cet=null;S._cea=null;render();}
function setCet(t){S._cet=t;render();}
function setCea(a){S._cea=a;render();}
function saveCls(){const dow=parseInt(document.getElementById('ce-dow')?.value||S.editDow||2);const time=document.getElementById('ce-time')?.value||'18:00';const dur=parseInt(document.getElementById('ce-dur')?.value||60);const ins=document.getElementById('ce-ins')?.value||INS[0];const type=S._cet||'alev';const aud=S._cea||'Adults';if(S.addCls){const nid='cls'+String(++IDC);if(!TT[dow])TT[dow]=[];TT[dow].push({id:nid,time,type,ins,dur,aud});}else if(S.editCls){const ix=(TT[dow]||[]).findIndex(c=>c.id===S.editCls.id);if(ix>=0)TT[dow][ix]={...S.editCls,time,type,ins,dur,aud};}closeCEdit();}
function reqDel(cid,dow){const c=(TT[dow]||[]).find(x=>x.id===cid);if(!c)return;S.cdel={...c,dow};render();}
function confDel(){if(!S.cdel)return;const{id,dow}=S.cdel;if(TT[dow])TT[dow]=TT[dow].filter(c=>c.id!==id);S.cdel=null;render();}
function cancelDel(){S.cdel=null;render();}
function editW(w){S.editWeek=w;render();}
function closeWE(){S.editWeek=false;render();}
function updateTech(week,cat,idx,field,val){const w=SCHED.find(x=>x.week===week);if(!w||!w[cat])return;if(typeof w[cat][idx]==='string')w[cat][idx]={t:w[cat][idx],video:''};w[cat][idx][field]=val;}
function addTech(week,cat){const w=SCHED.find(x=>x.week===week);if(!w){return;}if(!w[cat])w[cat]=[];w[cat].push({t:'New technique',video:''});render();}
function removeTech(week,cat,idx){const w=SCHED.find(x=>x.week===week);if(!w||!w[cat])return;w[cat].splice(idx,1);render();}
function toggleProg(week,prog){const w=SCHED.find(x=>x.week===week);if(!w)return;if(!w.programs)w.programs=[];const i=w.programs.indexOf(prog);if(i>=0)w.programs.splice(i,1);else w.programs.push(prog);render();}
function editTechVideo2(week,cat,idx){const w=SCHED.find(x=>x.week===week);if(!w)return;const list=w[cat]||[];const tech=list[idx];if(!tech)return;const tv=typeof tech==='object'?tech:{t:tech,video:''};const url=prompt('Video URL for "'+tv.t+'" (YouTube or Instagram):',tv.video||'');if(url===null)return;if(typeof list[idx]==='string')list[idx]={t:list[idx],video:url};else list[idx].video=url;render();}
function toggleEv(id){const e=EVENTS.find(x=>x.id===id);if(!e)return;const me=S.me.id;const idx=e.going.indexOf(me);if(idx>=0)e.going.splice(idx,1);else e.going.push(me);render();}
function addEvent(){alert('In the real app, an event creation form would open here.');}
function editEvent(id){alert('In the real app, an event edit form would open here.');}
function editTechVideo(week,techIdx){
  const w=SCHED.find(x=>x.week===week);if(!w)return;
  const tech=w.techs[techIdx];
  const cur=typeof tech==='object'?tech.video:'';
  const url=prompt('Enter YouTube or Instagram URL for this technique (leave empty to remove):',cur||'');
  if(url===null)return;
  if(typeof tech==='string')w.techs[techIdx]={t:tech,video:url};
  else tech.video=url;
  render();
}
function saveW(week){const w=SCHED.find(x=>x.week===week);if(!w)return;w.theme=document.getElementById('we-theme')?.value||w.theme;w.notes=document.getElementById('we-notes')?.value||'';w.video=document.getElementById('we-vid')?.value||'';S.editWeek=false;render();}

function setRQ(v){S.rq=v;render();}
function setRF2(el){S[el.dataset.key]=el.value;render();}
function toggleRFNear(){S.rfNear=!S.rfNear;render();}
function setRF(k,v){S[k]=v;render();}

function fmt(n,role){if(role==='admin'||role==='owner')return n;var p=n.trim().split(' ');if(p.length<2)return p[0];return p[0]+' '+p[p.length-1][0]+'.';}

render();
