async function executeChangeEmail(){
  if(!S.changeEmail)return;
  const{kind,sid,dbId,current}=S.changeEmail;
  const errEl=document.getElementById('ce-err');
  const errTxt=document.getElementById('ce-err-txt');
  const showErr=(m)=>{if(errEl&&errTxt){errTxt.textContent=m;errEl.style.display='flex';}};
  if(errEl)errEl.style.display='none';
  const raw=(document.getElementById('ce-input')||{}).value||'';
  const email=raw.trim().toLowerCase();
  if(!email)return showErr('Please enter an email address.');
  if(!/^\S+@\S+\.\S+$/.test(email))return showErr('Please enter a valid email address.');
  if(email===(current||'').toLowerCase())return showErr('That’s already the current email.');
  const cli=initSupabase();
  if(!cli)return showErr('Connection issue. Try again.');
  const r=await cli.rpc('admin_change_user_email',{p_target_kind:kind,p_target_db_id:dbId,p_new_email:email});
  if(r&&r.error){
    console.warn('[mybjj] admin_change_user_email:',r.error);
    return showErr(friendlyMutationError(r.error)||r.error.message||'Could not update email.');
  }
  // Mirror the change locally so the UI reflects it without a full
  // hydrate. The RPC already updated users/students/staff/whitelist.
  const target=kind==='staff'?STAFF.find(x=>x.id===sid):STUDENTS.find(x=>x.id===sid);
  if(target)target.email=email;
  // If the caller changed their own linked profile's email, sync S.profile too.
  if(S.profile&&target&&target._userId===S.profile.id){S.profile.email=email;if(S.me)S.me.email=email;}
  closeChangeEmail();
  showSaveToast2('Email updated to '+email);
}

async function saveEmailEditor(dispatch){
  if(!S.emailEdit)return;
  const{sid,kind}=S.emailEdit;
  const cli=initSupabase();if(!cli)return showSaveToast2('Connection issue','error');
  const isStaff=kind==='staff';
  const isParent=kind==='kidParent';
  const target=isStaff?STAFF.find(x=>x.id===sid):STUDENTS.find(x=>x.id===sid);
  if(!target)return;
  const raw=(document.getElementById('em-input')||{}).value||'';
  const email=raw.trim().toLowerCase();
  if(!email)return showSaveToast2('Please enter an email address.','error');
  if(!/^\S+@\S+\.\S+$/.test(email))return showSaveToast2('Please enter a valid email address.','error');
  const unit=UNITS.find(u=>u.id===target.unit);
  const unitDbId=unit&&unit._dbId;

  if(isStaff){
    const r=await cli.rpc('set_staff_email',{p_legacy_id:target.id,p_email:email});
    if(r&&r.error){console.warn('[mybjj] set_staff_email:',r.error);return showSaveToast2(friendlyMutationError(r.error),'error');}
    target.email=email;
  } else if(isParent){
    const r=await cli.from('students').update({parent_email:email}).eq('legacy_id',target.id);
    if(r&&r.error){console.warn('[mybjj] save parent_email:',r.error);return showSaveToast2(friendlyMutationError(r.error),'error');}
    target.parentEmail=email;
    const w=await cli.from('whitelist').upsert({email,role:'parent',unit_id:unitDbId,invited_by:S.profile&&S.profile.id},{onConflict:'email'});
    if(w&&w.error){console.warn('[mybjj] parent whitelist:',w.error);return showSaveToast2(friendlyMutationError(w.error),'error');}
  } else {
    const r=await cli.from('students').update({email}).eq('legacy_id',target.id);
    if(r&&r.error){console.warn('[mybjj] save student email:',r.error);return showSaveToast2(friendlyMutationError(r.error),'error');}
    target.email=email;
    const w=await cli.from('whitelist').upsert({email,role:'student',unit_id:unitDbId,invited_by:S.profile&&S.profile.id},{onConflict:'email'});
    if(w&&w.error){console.warn('[mybjj] student whitelist:',w.error);return showSaveToast2(friendlyMutationError(w.error),'error');}
  }
  closeEmailEditor();
  if(!dispatch){
    showSaveToast2('Email saved.');
    return;
  }
  const sr=await sendMagicLink(email);
  if(sr.ok)showSaveToast2('Sign-in link sent to '+email+'.');
  else showSaveToast2(friendlyMutationError(sr.error),'error');
}

// Phase 8 — admin-driven magic-link dispatch. Posts to the send-magic-link
// Edge Function with the caller's session JWT. The function gates on
// role + whitelist server-side, so this stays a thin shim.
async function sendMagicLink(email, opts){
  opts=opts||{};
  if(!email)return {ok:false,error:'Missing email'};
  const cli=initSupabase();
  if(!cli)return {ok:false,error:'Connection issue'};
  let session=null;
  try{ const r=await cli.auth.getSession(); session=r&&r.data&&r.data.session; }catch(_){}
  if(!session||!session.access_token)return {ok:false,error:'Not signed in'};
  const url=SUPABASE_URL+'/functions/v1/send-magic-link';
  const redirectTo=opts.redirectTo||'https://mybjj-app.com';
  try{
    const resp=await fetch(url,{
      method:'POST',
      headers:{'Authorization':'Bearer '+session.access_token,'Content-Type':'application/json'},
      body:JSON.stringify({email:email.toLowerCase().trim(),redirectTo}),
    });
    let body=null; try{ body=await resp.json(); }catch(_){}
    if(!resp.ok||!body||body.error){
      const e=(body&&body.error)||('HTTP '+resp.status);
      console.warn('[mybjj] send-magic-link:',e);
      return {ok:false,error:e};
    }
    console.log('[mybjj] send-magic-link OK',email);
    return {ok:true};
  }catch(e){
    console.warn('[mybjj] send-magic-link exception:',e);
    return {ok:false,error:e&&e.message||'Network error'};
  }
}

async function saveEditStaff(sid){
  const s=STAFF.find(x=>x.id===sid);if(!s)return;
  const fname=(document.getElementById('es-fullname')?.value||'').trim();
  const initials=(document.getElementById('es-initials')?.value||'').trim();
  const err=document.getElementById('es-err'),errTxt=document.getElementById('es-err-txt');
  const showErr=(m)=>{if(err&&errTxt){errTxt.textContent=m;err.style.display='flex';}};
  if(!fname)return showErr('Full name is required.');
  const payload={full_name:fname,initials};
  const ownerEdit=isOwner();
  let willChangeRole=false;
  if(ownerEdit){
    const belt=document.getElementById('es-belt')?.value;
    const degree=parseInt(document.getElementById('es-degree')?.value||'',10);
    const unitLegacy=document.getElementById('es-unit')?.value;
    const roleSel=document.getElementById('es-role')?.value;
    if(belt)payload.belt=belt;
    if(Number.isInteger(degree))payload.degree=degree;
    if(unitLegacy)payload.unit_legacy_id=unitLegacy;
    if(roleSel){
      const currentlyOwner=(s.role==='owner');
      const willBeOwner=(roleSel==='owner');
      if(currentlyOwner!==willBeOwner){
        willChangeRole=true;
        const msg=willBeOwner?'Promoting to Owner gives full admin rights. Continue?':'Demoting from Owner to Professor will reduce their access. Continue?';
        if(!confirm(msg))return;
        payload.role=willBeOwner?'owner':'admin';
        payload.role_title=willBeOwner?'Head Professor':'Professor';
      }
    }
    // Belt / degree change → journey delta.
    //   Upgrade: append a clean auto milestone — "<Color> belt" for a
    //            belt change, "Nth degree" on black, "Nth stripe" on
    //            any other belt. No more " belt promotion" suffix.
    //   Downgrade: REMOVE the milestone(s) being undone instead of
    //              dropping a Correction entry. Journey timeline
    //              stays a clean progression story.
    const beltChanged=belt&&belt!==s.belt;
    const degChanged=Number.isInteger(degree)&&degree!==(s.deg||0);
    if(beltChanged||degChanged){
      const newBelt=beltChanged?belt:s.belt;
      const newDeg=degChanged?degree:(s.deg||0);
      const oldBelt=s.belt;
      const oldDeg=s.deg||0;
      const BELTS=['white','blue','purple','brown','black'];
      const oldIdx=BELTS.indexOf(oldBelt);
      const newIdx=BELTS.indexOf(newBelt);
      const isDowngrade=(beltChanged&&newIdx<oldIdx)||(!beltChanged&&newDeg<oldDeg);
      const today=new Date().toISOString().slice(0,10);
      const actor=S.me?((S.me.belt==='black'?'Prof. ':'')+(S.me.name||'').split(' ')[0]):'staff';
      let newJourney=(s.journey||[]).slice();
      const ordOf=(n)=>n===1?'1st':n===2?'2nd':n===3?'3rd':(n+'th');
      if(isDowngrade){
        // Trim any auto milestone "ahead of" the new state. Manual
        // entries (no `auto` flag) and belt-less entries (transfers,
        // joined, etc.) are always preserved.
        newJourney=newJourney.filter(m=>{
          if(!m.auto)return true;
          if(!m.belt)return true;
          if(m.belt===newBelt){
            const om=String(m.label||'').toLowerCase().match(/^(\d+)(?:st|nd|rd|th)\s+(degree|stripe)$/);
            if(!om)return true; // belt-promotion entry itself — keep
            return parseInt(om[1],10)<=newDeg;
          }
          // Different belt — keep if at-or-below the new belt order.
          const idx=BELTS.indexOf(m.belt);
          if(idx<0)return true;
          return idx<=newIdx;
        });
        // Reset current pointer to the last remaining done entry.
        newJourney=newJourney.map(m=>Object.assign({},m,{current:false}));
        for(let i=newJourney.length-1;i>=0;i--){if(newJourney[i].done){newJourney[i].current=true;break;}}
      } else {
        // Upgrade — append exactly one clean milestone for the new state.
        let label;
        if(beltChanged){
          label=newBelt.charAt(0).toUpperCase()+newBelt.slice(1)+' belt';
        } else {
          label=ordOf(newDeg)+(newBelt==='black'?' degree':' stripe');
        }
        const notes='By '+actor+' on '+today;
        const milestone={label,date:today,done:true,belt:newBelt,classes:null,current:true,auto:true,notes};
        newJourney=newJourney.map(m=>Object.assign({},m,{current:false}));
        newJourney.push(milestone);
      }
      payload.journey=newJourney;
      s.journey=newJourney;
    }
    // Optimistic local
    s.name=fname;s.initials=initials;
    if(belt)s.belt=belt;
    if(Number.isInteger(degree))s.deg=degree;
    if(unitLegacy)s.unit=unitLegacy;
    if(willChangeRole){s.role=payload.role;s.roleTitle=payload.role_title;}
  }else{
    s.name=fname;s.initials=initials;
  }
  if(isStaffSelf(s)){
    S.me.name=fname;S.me.initials=initials;
    if(S.profile)S.profile.full_name=fname;
    if(S.profile&&S.profile.id){
      withSb(c=>c.from('users').update({full_name:fname}).eq('id',S.profile.id),'update self users.full_name');
    }
  }
  let emailChange=null;
  if(ownerEdit){
    const newEmail=(document.getElementById('es-email')?.value||'').trim().toLowerCase();
    if(newEmail&&newEmail!==(s.email||'').toLowerCase()){
      if(!/^\S+@\S+\.\S+$/.test(newEmail))return showErr('Please enter a valid email address.');
      emailChange=newEmail;s.email=newEmail;
    }
  }
  S.editStaff=null;render();
  const cli=initSupabase();
  if(!cli){showSaveToast2('Connection issue','error');return;}
  const fn=ownerEdit?'edit_staff_admin':'edit_staff_self';
  const r=await cli.rpc(fn,{p_legacy_id:sid,p_payload:payload});
  if(r&&r.error){console.warn('[mybjj] edit staff:',r.error);showSaveToast2(friendlyMutationError(r.error),'error');return;}
  console.log('[mybjj] edit staff OK');
  if(emailChange){
    const er=await cli.rpc('set_staff_email',{p_legacy_id:sid,p_email:emailChange});
    if(er&&er.error){console.warn('[mybjj] set staff email:',er.error);showSaveToast2(friendlyMutationError(er.error),'error');return;}
    console.log('[mybjj] set staff email OK');
  }
  showSaveToast2('Staff profile updated.');
}

function triggerPhotoUpload(sid){

  _crop.sid=sid;

  inp.click();
}
function _cropStart(file){
  if(!file.type||file.type.indexOf('image/')!==0){showSaveToast2('Please choose an image file.','error');return;}
  if(file.size>10*1024*1024){showSaveToast2('Image too large (max 10MB).','error');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const im=new Image();
    im.onload=()=>{
      _crop.img=im;
      const w=im.naturalWidth,h=im.naturalHeight;
      const minDim=Math.min(w,h);
      _crop.scale=_CROP_SIZE/minDim;
      _crop.x=(_CROP_SIZE-w*_crop.scale)/2;
      _crop.y=(_CROP_SIZE-h*_crop.scale)/2;
      S.cropOpen=true;render();
      requestAnimationFrame(_cropDraw);
    };
    im.onerror=()=>showSaveToast2("Couldn't load image.",'error');
    im.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function _cropDraw(){
  const cv=document.getElementById('crop-canvas');
  if(!cv||!_crop.img)return;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#000';ctx.fillRect(0,0,_CROP_SIZE,_CROP_SIZE);
  ctx.drawImage(_crop.img,_crop.x,_crop.y,_crop.img.naturalWidth*_crop.scale,_crop.img.naturalHeight*_crop.scale);
}
function _cropPoint(ev){if(ev.touches&&ev.touches[0])return{x:ev.touches[0].clientX,y:ev.touches[0].clientY};return{x:ev.clientX,y:ev.clientY};}
function _pinchInfo(ev){const t1=ev.touches[0],t2=ev.touches[1];const dx=t2.clientX-t1.clientX,dy=t2.clientY-t1.clientY;return{dist:Math.sqrt(dx*dx+dy*dy)};}
function _cropApplyZoom(newScale){
  newScale=Math.max(0.3,Math.min(5,newScale));
  if(newScale===_crop.scale)return;
  const cx=_CROP_SIZE/2,cy=_CROP_SIZE/2;
  _crop.x=cx-(cx-_crop.x)*(newScale/_crop.scale);
  _crop.y=cy-(cy-_crop.y)*(newScale/_crop.scale);
  _crop.scale=newScale;
}
function _cropPanStart(ev){
  if(ev.touches&&ev.touches.length===2){_pinch=_pinchInfo(ev);_crop.panning=false;ev.preventDefault();return;}
  _crop.panning=true;const p=_cropPoint(ev);_crop.lastX=p.x;_crop.lastY=p.y;ev.preventDefault();
}
function _cropPanMove(ev){
  if(ev.touches&&ev.touches.length===2&&_pinch){
    const cur=_pinchInfo(ev);
    if(_pinch.dist>0)_cropApplyZoom(_crop.scale*(cur.dist/_pinch.dist));
    _pinch=cur;_cropDraw();ev.preventDefault();return;
  }
  if(!_crop.panning)return;
  const p=_cropPoint(ev);_crop.x+=p.x-_crop.lastX;_crop.y+=p.y-_crop.lastY;_crop.lastX=p.x;_crop.lastY=p.y;_cropDraw();ev.preventDefault();
}
function _cropPanEnd(){_crop.panning=false;_pinch=null;}
function _cropZoom(ev){ev.preventDefault();_cropApplyZoom(_crop.scale*(ev.deltaY>0?0.9:1.1));_cropDraw();}

async function uploadCroppedPhoto(){
  const cli=initSupabase();
  if(!cli){showSaveToast2('Connection issue','error');return;}
  const sid=_crop.sid;
  const out=document.createElement('canvas');out.width=512;out.height=512;
  const ctx=out.getContext('2d');
  const sx=-_crop.x/_crop.scale,sy=-_crop.y/_crop.scale,sw=_CROP_SIZE/_crop.scale;
  ctx.drawImage(_crop.img,sx,sy,sw,sw,0,0,512,512);
  const blob=await new Promise(res=>out.toBlob(res,'image/jpeg',0.85));
  // Self-upload path: goes through photo_approvals like every other photo,
  // so the academy's visual standards apply uniformly (per Prof. John).
  // The subject is either the caller's staff row (if linked) or the users
  // row itself (dev admin / users without a staff linkage).
  if(sid==='self'){
    if(!S.profile||!S.profile.id){showSaveToast2('Not signed in.','error');return;}
    const linkedStaff=STAFF.find(x=>x._userId===S.profile.id);
    // For students uploading their own photo we need student_id on the
    // approval row so approvePhoto can route to public.students.photo_url
    // instead of falling through to the user-subject branch.
    const linkedStudent=linkedStaff?null:STUDENTS.find(x=>x._userId===S.profile.id);
    const pathPrefix=linkedStaff
      ?('staff/'+linkedStaff.id)
      :linkedStudent?('student/'+linkedStudent.id):('self/'+S.profile.id);
    const path=pathPrefix+'/'+Date.now()+'.jpg';
    // Clean up any prior pending row for the same subject (one pending
    // per subject at a time).
    try{
      let q=cli.from('photo_approvals').select('id,photo_url').eq('user_id',S.profile.id).eq('status','pending');
      if(linkedStaff)q=q.eq('staff_id',linkedStaff._dbId);
      else if(linkedStudent)q=q.eq('student_id',linkedStudent._dbId);
      else q=q.is('staff_id',null).is('student_id',null);
      const pend=await q;
      if(pend&&pend.data&&pend.data.length){
        for(const row of pend.data){
          if(row.photo_url){try{await cli.storage.from('avatars').remove([row.photo_url]);}catch(_){}}
          try{await cli.from('photo_approvals').delete().eq('id',row.id);}catch(_){}
        }
      }
    }catch(e){console.warn('[mybjj] photo cleanup (self):',e);}
    const up=await cli.storage.from('avatars').upload(path,blob,{contentType:'image/jpeg'});
    if(up.error){console.warn('[mybjj] upload self photo fail:',up.error);showSaveToast2(friendlyMutationError(up.error),'error');return;}
    console.log('[mybjj] upload self photo OK');
    const ins=await cli.from('photo_approvals').insert({
      user_id:S.profile.id,
      student_id:linkedStudent?linkedStudent._dbId:null,
      staff_id:linkedStaff?linkedStaff._dbId:null,
      photo_url:path,
      status:'pending',
    });
    if(ins&&ins.error){console.warn('[mybjj] self photo approval insert fail:',ins.error);showSaveToast2(friendlyMutationError(ins.error),'error');return;}
    console.log('[mybjj] self photo approval pending OK');
    S.cropOpen=false;_crop.img=null;_crop.sid=null;
    showSaveToast2("Photo submitted for approval. You'll see it on your profile once approved.");
    render();
    if(canEditClassCounts())loadPhotoQueue();
    return;
  }
  const s=STUDENTS.find(x=>x.id===sid);
  if(!s||!s._dbId){showSaveToast2('Student not found.','error');return;}
  try{
    const pend=await cli.from('photo_approvals').select('id,photo_url').eq('student_id',s._dbId).eq('status','pending');
    if(pend&&pend.data&&pend.data.length){
      for(const row of pend.data){
        if(row.photo_url){try{await cli.storage.from('avatars').remove([row.photo_url]);}catch(_){}}
        try{await cli.from('photo_approvals').delete().eq('id',row.id);}catch(_){}
      }
    }
  }catch(e){console.warn('[mybjj] photo cleanup',e);}
  const path=s.id+'/'+Date.now()+'.jpg';
  const up=await cli.storage.from('avatars').upload(path,blob,{contentType:'image/jpeg'});
  if(up.error){console.warn('[mybjj] upload photo fail:',up.error);showSaveToast2(friendlyMutationError(up.error),'error');return;}
  console.log('[mybjj] upload photo OK');
  const ins=await cli.from('photo_approvals').insert({student_id:s._dbId,user_id:S.profile&&S.profile.id,photo_url:path,status:'pending'});
  if(ins.error){console.warn('[mybjj] photo approval insert fail:',ins.error);showSaveToast2(friendlyMutationError(ins.error),'error');return;}
  console.log('[mybjj] photo approval pending OK');
  S.cropOpen=false;_crop.img=null;_crop.sid=null;
  showSaveToast2("Photo submitted for approval. You'll see it on the profile once approved.");
  render();
  if(canEditClassCounts())loadPhotoQueue();
}

async function loadPhotoQueue(){
  const cli=initSupabase();if(!cli)return;
  S.photoQueueLoading=true;render();
  try{
    const r=await cli.from('photo_approvals').select('id,photo_url,submitted_at,student_id,user_id,staff_id,student:students(legacy_id,full_name,initials,belt,prog),staff:staff(legacy_id,full_name,initials,belt)').eq('status','pending').order('submitted_at',{ascending:true});
    if(r&&r.error){console.warn('[mybjj] photo queue:',r.error);S.photoQueue=[];}
    else{S.photoQueue=(r&&r.data)||[];}
  }catch(e){console.warn('[mybjj] photo queue exception:',e);S.photoQueue=[];}
  S.photoQueueLoading=false;render();
}
async function approvePhoto(id){
  const cli=initSupabase();if(!cli)return;
  const row=(S.photoQueue||[]).find(r=>r.id===id);if(!row)return;
  S.photoQueue=(S.photoQueue||[]).filter(r=>r.id!==id);render();
  const r=await cli.from('photo_approvals').update({status:'approved',approved_by_id:S.profile&&S.profile.id,approved_at:new Date().toISOString()}).eq('id',id);
  if(r&&r.error){console.warn('[mybjj] photo approval fail:',r.error);showSaveToast2(friendlyMutationError(r.error),'error');loadPhotoQueue();return;}
  console.log('[mybjj] photo approval OK');
  if(row.student_id){
    const upd=await cli.from('students').update({photo_url:row.photo_url}).eq('id',row.student_id);
    if(upd&&upd.error)console.warn('[mybjj] student photo_url update:',upd.error);
    const legacy=row.student&&row.student.legacy_id;
    const s=STUDENTS.find(x=>x.id===legacy);
    if(s){s.photoUrl=row.photo_url;render();}
  } else if(row.staff_id){
    const upd=await cli.from('staff').update({photo_url:row.photo_url}).eq('id',row.staff_id);
    if(upd&&upd.error)console.warn('[mybjj] staff photo_url update:',upd.error);
    const s=STAFF.find(x=>x._dbId===row.staff_id);
    if(s){
      s.photoUrl=row.photo_url;
      if(isStaffSelf(s)){S.me.photoUrl=row.photo_url;if(S.profile)S.profile.photo_url=row.photo_url;}
      render();
    }
  } else {
    // User-subject path (dev admin / any user without a staff linkage).
    const upd=await cli.from('users').update({photo_url:row.photo_url}).eq('id',row.user_id);
    if(upd&&upd.error)console.warn('[mybjj] users photo_url update:',upd.error);
    if(S.profile&&S.profile.id===row.user_id){
      S.profile.photo_url=row.photo_url;S.me.photoUrl=row.photo_url;render();
    }
  }
  showSaveToast2('Photo approved.');
}

}

// Pull-to-refresh: re-sync profile (status / role / unit_id) and all the
// data tables the in-memory views read from. Idempotent — multiple calls
// in flight just race the writes, last one wins.
let _refreshInFlight = false;
async function refreshAppState(){
  if(_refreshInFlight)return true;
  _refreshInFlight = true;
  let ok = true;
  try{
    const cli = initSupabase();
    if(!cli||!S.loggedIn){return false;}
    // Profile first — handles the "admin demoted me / status changed" case.
    try{
      const{data,error} = await cli.rpc('claim_profile');
      if(error){ok=false;console.warn('[mybjj] refresh profile',error.message);}
      else if(data){
        S.profile = data;
        if(data.status === 'approved'){
          S.me = meFromProfile(data);
        } else {
          S.me = null; S.loggedIn = false;
          S.authState = data.status === 'rejected' ? 'rejected' : 'pending';
          render();
          return true; // status flip isn't a refresh failure, it's a legit state change
        }
      }
    }catch(e){ok=false;console.warn('[mybjj] refresh profile',e);}
    try{
      await hydrateData();
    }catch(e){ok=false;console.warn('[mybjj] refresh hydrate',e);}
    if(canEditClassCounts()){
      try{ await loadPhotoQueue(); }catch(e){ok=false;console.warn('[mybjj] refresh photo queue',e);}
    }
    render();
    return ok;
  } finally {
    _refreshInFlight = false;
  }
}

// Wire pull-to-refresh onto the scrolling .content element. render()
// rebuilds #app.innerHTML on every state change, which replaces .content
// with a new DOM node — so a one-time init binds to a short-lived
// element and stops working after the first re-render. We rebind
// whenever we see a different .content element.
function initPullToRefresh(){
  if(typeof PullToRefresh === 'undefined')return;
  const el=document.querySelector('.content');
  if(!el)return;
  if(window._ptrBound===el)return; // already bound to this element
  try{PullToRefresh.destroyAll();}catch(_){}
  window._ptrBound=el;
  // Two SVGs the library swaps between: clean down-arrow during pull,
  // spinner during refresh. The .mybjj-ptr-spinner class carries the
  // rotation animation (defined in the head <style>).
  const PTR_ARROW = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>';
  const PTR_SPIN  = '<svg class="mybjj-ptr-spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="9" stroke-dasharray="42 16"/></svg>';
  PullToRefresh.init({
    mainElement: '.content',
    triggerElement: '.content',
    distThreshold: 80,
    distMax: 120,
    distReload: 60,
    // Empty pull-instruction so we don't fight the icon fade-in for
    // attention; library still shows "Release to refresh" once the
    // user passes the threshold and "Refreshing…" while we're working.
    instructionsPullToRefresh: '',
    instructionsReleaseToRefresh: 'Release to refresh',
    instructionsRefreshing: 'Refreshing…',
    iconArrow: PTR_ARROW,
    iconRefreshing: PTR_SPIN,
    onRefresh: async function(){
      // Success is silent — the user sees the data refresh on screen,
      // a toast on top of that is just noise. Only the failure path
      // gets a toast (the user otherwise has no signal the pull
      // didn't go through).
      const ok = await refreshAppState();
      if(!ok) showSaveToast2("Couldn't refresh. Try again.",'error');
    },
    // Suppress while a modal / sub-panel is open — pulling inside an
    // edit modal would otherwise refresh state mid-edit.
    shouldPullToRefresh: function(){
      const c = document.querySelector('.content');
      if(!c) return false;
      if(c.scrollTop > 0) return false;
      if(S.cropOpen || S.editJny || S.editCounts) return false;
      if(S.emailEdit || S.changeEmail || S.promoteFor || S.fbModalFor) return false;
      if(S.editStaff || S.addStaff || S.removeStaffConfirm) return false;
      if(S.editCls!=null || S.addCls) return false;
      if(S.editEv || S.addEv) return false;
      if(S.sub) return false;
      return true;
    },
  });
}

// Step 1 → Step 2 advance. Calls the public email_signin_state RPC to
// decide whether to route into Step 2A (password) or Step 2B (email
// link). 'not_authorized' stays on Step 1 with an inline error.
async function advanceAuthStep(){
  const c=initSupabase(); if(!c){S.authMsg=friendlyAuthError('network');render();return;}
  const email=(S.authEmail||'').trim().toLowerCase();
  if(!email||!/^\S+@\S+\.\S+$/.test(email)){S.authMsg='Please enter a valid email address.';render();return;}
  S.authBusy=true;S.authMsg='';render();
  try{
    const{data,error}=await c.rpc('email_signin_state',{p_email:email});
    if(error){
      console.warn('[mybjj] email_signin_state:',error);
      S.authMsg=friendlyAuthError(error);
    } else if(data==='not_authorized'){
      S.authMsg="This email isn't authorized. Contact your professor or owner to be invited.";
    } else {
      S.authEmail=email;
      S.authHasPassword=(data==='has_password');
      S.authStep=2;
      S.authMsg='';
    }
  }catch(e){console.warn('[mybjj] email_signin_state',e);S.authMsg=friendlyAuthError(e);}
  S.authBusy=false;render();
}

// "Not you?" / "Use another method" — clear email + return to Step 1.
// Also resets authState so the post-magic-send screen (authState='magic-sent')
// goes back to the email-entry view; without this the send-confirmation
// screen stays up forever.
function resetAuthStep(){
  S.authStep=1;
  S.authEmail='';
  S.authHasPassword=false;
  S.authMsg='';
  S.authState='unauthenticated';
  render();
}

async function signInGoogle(){

// Phase 9 — password sign-in. The magic-link path is now triggered by
// the explicit "Sign in with email link" button below, not by leaving
// the password field empty (the implicit fallback was confusing).
async function signInWithEmail(){
  const c=initSupabase(); if(!c){S.authMsg=friendlyAuthError('network');render();return;}
  const email=(S.authEmail||'').trim().toLowerCase();
  const pwd=(document.getElementById('auth-pwd')||{}).value||'';
  if(!email||!/^\S+@\S+\.\S+$/.test(email)){S.authMsg='Please enter a valid email address.';render();return;}
  if(!pwd){
    S.authMsg='Enter your password, or use the email link option below.';
    render();
    return;
  }
  S.authBusy=true;S.authMsg='';render();
  try{
    const{error}=await c.auth.signInWithPassword({email,password:pwd});
    if(error){
      console.warn('[mybjj] password sign-in:',error.message);
      const m=(error.message||'').toLowerCase();
      // Vague on purpose — don't reveal whether the email exists.
      if(m.includes('invalid login credentials')||m.includes('invalid')) S.authMsg='Incorrect email or password.';
      else if(m.includes('rate limit')) S.authMsg='Too many attempts. Try again in a minute.';
      else S.authMsg=friendlyAuthError(error);
    }
  }catch(e){console.warn('[mybjj] password',e);S.authMsg=friendlyAuthError(e);}
  S.authBusy=false;render();
}

function updatePwdStrength(){
  const v=(document.getElementById('sp-new')||{}).value||'';
  const el=document.getElementById('sp-strength');
  if(!el)return;
  if(!v){el.textContent='';el.style.color='var(--text3)';return;}
  let score=0;
  if(v.length>=8)score++;
  if(v.length>=12)score++;
  if(/[A-Z]/.test(v)&&/[a-z]/.test(v))score++;
  if(/\d/.test(v))score++;
  if(/[^A-Za-z0-9]/.test(v))score++;
  const labels=['Too short','Weak','Okay','Good','Strong','Strong'];
  const colors=['var(--red-text)','var(--red-text)','var(--amber-text)','var(--green-text)','var(--green-text)','var(--green-text)'];
  el.textContent='Strength: '+labels[score];
  el.style.color=colors[score];
}

async function saveSetPassword(){
  const np=(document.getElementById('sp-new')||{}).value||'';
  const cf=(document.getElementById('sp-confirm')||{}).value||'';
  const curEl=document.getElementById('sp-current');
  const cp=curEl?(curEl.value||''):'';
  const err=document.getElementById('sp-err');
  const errTxt=document.getElementById('sp-err-txt');
  const showErr=(m)=>{if(err&&errTxt){errTxt.textContent=m;err.style.display='flex';}};
  if(err)err.style.display='none';
  const recovery=!!S.passwordRecovery;
  const hasPwd=!!(S.profile&&S.profile.has_password);
  const needCurrent=hasPwd&&!recovery;
  if(needCurrent&&!cp)return showErr('Enter your current password.');
  if(np.length<8)return showErr('Password must be at least 8 characters.');
  if(np!==cf)  return showErr('Passwords don’t match.');
  if(needCurrent&&cp===np)return showErr('New password must be different from current.');
  const cli=initSupabase();if(!cli)return showErr('Connection issue. Try again.');
  // Re-auth with the current password first when the project has
  // "Require current password when updating" enabled — Supabase Auth
  // otherwise rejects updateUser with that exact error. Re-auth on
  // the same session works because signInWithPassword issues a fresh
  // grant on success; no state to clean up on failure.
  if(needCurrent){
    const email=(S.profile&&S.profile.email)||(S.me&&S.me.email)||'';
    if(!email)return showErr('Couldn’t verify current password — email missing.');
    const reauth=await cli.auth.signInWithPassword({email,password:cp});
    if(reauth&&reauth.error){
      console.warn('[mybjj] reauth for password change:',reauth.error);
      const msg=(reauth.error.message||'').toLowerCase();
      if(msg.includes('invalid')||msg.includes('credentials')) return showErr('Current password is incorrect.');
      return showErr(reauth.error.message||'Couldn’t verify current password.');
    }
  }
  const{error}=await cli.auth.updateUser({password:np});
  if(error){
    console.warn('[mybjj] set password:',error);
    showErr(error.message||'Couldn’t update password. Try again.');
    return;
  }
  const wasRecovery=recovery;
  S.passwordRecovery=false;
  // Tell Postgres the user has a password now so future RPC calls
  // route them correctly through the two-step login. Best-effort —
  // the actual auth secret was already saved by updateUser above.
  try{await cli.rpc('mark_password_set');}catch(e){console.warn('[mybjj] mark_password_set',e);}
  if(S.profile)S.profile.has_password=true;
  S.sub=null;
  showSaveToast2(wasRecovery?'Password set — you’re signed in.':(hasPwd?'Password updated.':'Password saved.'));
  render();
}

// Parses the synthetic class id getDC() builds: 'YYYY-MM-DD_HH:MM_legacy'
function _parseCID(id){const m=String(id||'').match(/^(\d{4}-\d{2}-\d{2})_(\d{2}:\d{2})_(.+)$/);if(!m)return null;return{date:m[1],time:m[2],legacy:m[3]};}

// "I'm going" — INSERTs an attendance row for the signed-in user's
// linked students row. Pushes to the local ATTENDANCE array first for
// instant UI; on DB error the row is removed.
async function doCI(id){
  const stu=myStudentRow();
  if(!stu){showSaveToast2('Sign in as a student to check in.','error');return;}
  const c=_parseCID(id);if(!c){showSaveToast2('Class id malformed','error');return;}
  const t=(TT[(new Date(c.date+'T00:00:00')).getDay()]||[]).find(x=>x.id===c.legacy)||{};
  const unit=UNITS.find(u=>u.id===stu.unit);
  const local={_dbId:'local-'+Date.now(),studentDbId:stu._dbId,classDate:c.date,classTime:c.time,classType:t.type||null,status:'going'};
  ATTENDANCE.push(local);
  render();
  const cli=initSupabase();if(!cli||!stu._dbId)return;
  const r=await cli.from('attendance').insert({student_id:stu._dbId,unit_id:unit&&unit._dbId||null,class_date:c.date,class_time:c.time,class_type:t.type||null,status:'going'}).select('id').single();
  if(r&&r.error){
    // Roll back local
    const ix=ATTENDANCE.indexOf(local);if(ix>=0)ATTENDANCE.splice(ix,1);
    console.warn('[mybjj] check-in failed:',r.error);
    showSaveToast2(friendlyMutationError(r.error),'error');
    render();return;
  }
  if(r&&r.data)local._dbId=r.data.id;
  // 'going' rows don't change cached counts (only 'present' does), but
  // calling refreshStudentStats here keeps the local row in lock-step
  // with whatever the trigger decided — safer than assuming.
  await refreshStudentStats(stu._dbId);
}

// Undo — DELETE the attendance row for the signed-in user's student row.
async function undoCI(id){
  const stu=myStudentRow();if(!stu)return;
  const c=_parseCID(id);if(!c)return;
  const ix=ATTENDANCE.findIndex(a=>a.studentDbId===stu._dbId&&a.classDate===c.date&&a.classTime===c.time);
  if(ix<0)return;
  const removed=ATTENDANCE.splice(ix,1)[0];
  render();
  const cli=initSupabase();if(!cli||!removed._dbId||String(removed._dbId).startsWith('local-'))return;
  const r=await cli.from('attendance').delete().eq('id',removed._dbId);
  if(r&&r.error){
    // Restore
    ATTENDANCE.push(removed);
    console.warn('[mybjj] undo check-in failed:',r.error);
    showSaveToast2(friendlyMutationError(r.error),'error');
    render();return;
  }
  // If the staff had already confirmed this row, deleting it should
  // decrement total — pull the fresh counts.
  await refreshStudentStats(stu._dbId);
}

// classMinutesAfterEnd: how many minutes past the class end-time we are.
// Used to lock attendance edits 60min after a class ends. Returns null
// for any class not on today's date (future/past days are always
// editable for now — only "today, an hour after the bell" locks).
function classMinutesAfterEnd(cid){
  const c=_parseCID(cid);if(!c)return null;
  if(c.date!==dk(TODAY))return null;
  const t=(TT[(new Date(c.date+'T00:00:00')).getDay()]||[]).find(x=>x.id===c.legacy)||{};
  const [h,m]=String(c.time||'00:00').split(':').map(Number);
  const startMin=(h||0)*60+(m||0);
  const endMin=startMin+(t.dur||60);
  const parts=new Intl.DateTimeFormat('en-US',{timeZone:'Australia/Sydney',hour:'2-digit',minute:'2-digit',hour12:false}).formatToParts(new Date());
  const ch=+(parts.find(p=>p.type==='hour')||{}).value||0;
  const cm=+(parts.find(p=>p.type==='minute')||{}).value||0;
  return (ch*60+cm)-endMin;
}
function isClassLocked(cid){
  const c=_parseCID(cid);if(!c)return false;
  // Days other than today are always editable. Today, lock 60min after
  // the class ends (staff have a clear cut-off; matches the spec).
  const mins=classMinutesAfterEnd(cid);
  if(mins===null)return false;
  return mins>60;
}

// Refresh cached counts on the local STUDENTS row after an attendance
// mutation. The DB trigger has already recomputed; we just pull the
// fresh values so the in-memory view matches without a full hydrate.
async function refreshStudentStats(dbId){
  if(!dbId)return;
  const cli=initSupabase();if(!cli)return;
  // Belt-and-suspenders: explicitly call the RPC too. The trigger
  // should have already fired, but a manual call ensures the row is
  // updated even if a future code-path bypasses the trigger.
  try{await cli.rpc('recompute_student_stats',{p_student_id:dbId});}catch(_){}
  const r=await cli.from('students').select('total,gi_classes,nogi_classes,grade,gi_grade').eq('id',dbId).single();
  if(r&&r.data){
    const s=STUDENTS.find(x=>x._dbId===dbId);
    if(s){s.total=r.data.total||0;s.giTotal=r.data.gi_classes||0;s.grade=r.data.grade||0;s.giGrade=r.data.gi_grade||0;}
  }
}

// markP / markA / markG — staff toggles per attendee. Operate on the
// attendance row keyed by student_id+date+time (created by doCI or
// inserted on first mark). After the DB UPDATE, refreshStudentStats
// pulls the new cached counts so the roster + profile views see the
// change immediately. Locked once we're more than an hour past the
// class end-time (isClassLocked).
async function _setAttStatus(cid,sid,newStatus){
  const s=STUDENTS.find(x=>x.id===sid);if(!s||!s._dbId)return;
  const c=_parseCID(cid);if(!c)return;
  if(isClassLocked(cid)){showSaveToast2('Class locked — attendance can no longer be changed.','error');return;}
  let row=ATTENDANCE.find(a=>a.studentDbId===s._dbId&&a.classDate===c.date&&a.classTime===c.time);
  const t=(TT[(new Date(c.date+'T00:00:00')).getDay()]||[]).find(x=>x.id===c.legacy)||{};
  const unit=UNITS.find(u=>u.id===s.unit);
  const confirmed=newStatus==='going'?null:(S.profile&&S.profile.id);
  const confirmedAt=newStatus==='going'?null:new Date().toISOString();
  const cli=initSupabase();
  if(!row){
    // No existing row — staff is recording attendance for a student
    // who didn't self-check-in. INSERT a fresh row at the target
    // status, the trigger will recompute.
    const local={_dbId:'local-'+Date.now(),studentDbId:s._dbId,classDate:c.date,classTime:c.time,classType:t.type||null,status:newStatus,confirmedBy:confirmed,confirmedAt};
    ATTENDANCE.push(local);
    render();
    if(!cli)return;
    const r=await cli.from('attendance').insert({student_id:s._dbId,unit_id:unit&&unit._dbId||null,class_date:c.date,class_time:c.time,class_type:t.type||null,status:newStatus,confirmed_by:confirmed,confirmed_at:confirmedAt}).select('id').single();
    if(r&&r.error){
      const ix=ATTENDANCE.indexOf(local);if(ix>=0)ATTENDANCE.splice(ix,1);
      console.warn('[mybjj] insert attendance ('+newStatus+'):',r.error);
      showSaveToast2(friendlyMutationError(r.error),'error');render();return;
    }
    if(r&&r.data)local._dbId=r.data.id;
    showSaveToast2(s.name.split(' ')[0]+' marked '+newStatus[0].toUpperCase()+newStatus.slice(1));
    await refreshStudentStats(s._dbId);render();return;
  }
  const prev=row.status;
  row.status=newStatus;row.confirmedBy=confirmed;row.confirmedAt=confirmedAt;
  render();
  if(!cli||String(row._dbId).startsWith('local-'))return;
  const r=await cli.from('attendance').update({status:newStatus,confirmed_by:confirmed,confirmed_at:confirmedAt}).eq('id',row._dbId);
  if(r&&r.error){
    row.status=prev;
    console.warn('[mybjj] update attendance ('+newStatus+'):',r.error);
    showSaveToast2(friendlyMutationError(r.error),'error');render();return;
  }
  showSaveToast2(s.name.split(' ')[0]+' marked '+newStatus[0].toUpperCase()+newStatus.slice(1));
  await refreshStudentStats(s._dbId);render();
}

function saveFb(sid){const txt=document.getElementById('fb-input')?.value;if(!txt)return;const s=STUDENTS.find(x=>x.id===sid);if(!s)return;if(!s.feedback)s.feedback=[];const insName=(S.me&&S.me.name)||'Prof. Mario';const dateLbl=new Date().toLocaleDateString('en-AU',{month:'short',year:'numeric'});const fbId=newId();s.feedback.unshift({_dbId:fbId,ins:insName,date:dateLbl,text:txt});S.addFb=null;render();if(s._dbId){withSb(c=>c.from('feedback').insert({id:fbId,student_id:s._dbId,instructor_id:meStaffDbId(),text:txt,date:new Date().toISOString().slice(0,10)}),'insert feedback');withSb(c=>c.from('students').update({feedback:s.feedback}).eq('id',s._dbId),'update student feedback');}}

async function saveEditStu(){
  const sid=S.editStuFor||S.viewStu;
  const s=STUDENTS.find(x=>x.id===sid);if(!s)return;
  const val=(id)=>((document.getElementById(id)||{}).value||'').trim();
  const first=val('es-first'), last=val('es-last');
  const err=document.getElementById('es-err');const errTxt=document.getElementById('es-err-txt');
  const showErr=(m)=>{if(err&&errTxt){errTxt.textContent=m;err.style.display='flex';}};
  if(err)err.style.display='none';
  if(!first||!last)return showErr('First and last name are required.');
  const phone=val('es-phone');
  if(phone&&!/^[\d+\-()\s]{6,}$/.test(phone))return showErr('Phone format looks off.');
  const isKids=s.prog==='kids';
  const nick=val('es-nick').slice(0,40)||null;
  const dob=val('es-dob')||null;
  const gender=val('es-gender')||null;
  const hasGi=!!document.getElementById('es-hasgi')?.classList.contains('on');
  const weightKg=val('es-weight')?parseInt(val('es-weight'),10):null;
  const heightCm=val('es-height')?parseInt(val('es-height'),10):null;
  const ecName=val('es-ecname')||null;
  const ecPhone=val('es-ecphone')||null;
  const parentName=isKids?(val('es-pname')||null):s.parentName;
  const parentPhone=isKids?(val('es-pphone')||null):s.parentPhone;
  const parentEmail=isKids?(val('es-pemail')||'').toLowerCase()||null:s.parentEmail;
  const parent2Name=isKids?(val('es-p2name')||null):s.parent2Name;
  const parent2Phone=isKids?(val('es-p2phone')||null):s.parent2Phone;
  const parent2Email=isKids?(val('es-p2email')||'').toLowerCase()||null:s.parent2Email;
  if(isKids){
    if(!parentName||!parentPhone||!parentEmail) return showErr('Parent 1 name, phone and email are required for kids.');
    if(!/^\S+@\S+\.\S+$/.test(parentEmail))return showErr('Parent 1 email format looks off.');
    if(parent2Email&&!/^\S+@\S+\.\S+$/.test(parent2Email))return showErr('Parent 2 email format looks off.');
    if(parent2Email&&parent2Email===parentEmail)return showErr('Parent 1 and Parent 2 emails must differ.');
  }
  const fullName=(first+' '+last).trim();
  const initials=((first[0]||'')+(last[0]||'')).toUpperCase()||s.initials;

  // Local first (UI snappy), then DB.
  s.name=fullName;s.initials=initials;s.nickname=nick;
  s.dob=dob;s.phone=phone||null;s.gender=gender;s.hasGi=hasGi;
  s.weightKg=weightKg;s.heightCm=heightCm;
  s.ecName=ecName;s.ecPhone=ecPhone;
  if(isKids){
    s.parentName=parentName;s.parentPhone=parentPhone;s.parentEmail=parentEmail;
    s.parent2Name=parent2Name;s.parent2Phone=parent2Phone;s.parent2Email=parent2Email;
  }
  closeEditStu();
  showSaveToast2('Profile updated.');render();

  if(!s._dbId)return;
  const cli=initSupabase();if(!cli)return;
  const payload={full_name:fullName,initials,nickname:nick,date_of_birth:dob,phone:phone||null,gender,has_gi:hasGi,weight_kg:weightKg,height_cm:heightCm,emergency_contact_name:ecName,emergency_contact_phone:ecPhone};
  if(isKids){
    payload.parent_name=parentName;payload.parent_phone=parentPhone;payload.parent_email=parentEmail;
    payload.parent2_name=parent2Name;payload.parent2_phone=parent2Phone;payload.parent2_email=parent2Email;
  }
  const r=await cli.from('students').update(payload).eq('id',s._dbId);
  if(r&&r.error){console.warn('[mybjj] update student:',r.error);showSaveToast2(friendlyMutationError(r.error),'error');return;}
  // If Parent 2 email is filled and unit is known, whitelist them as
  // a parent role linked to this student. Idempotent on email.
  if(isKids&&parent2Email&&s.unit){
    const unit=UNITS.find(u=>u.id===s.unit);
    if(unit&&unit._dbId){
      const wl=await cli.from('whitelist').upsert({email:parent2Email,role:'parent',unit_id:unit._dbId,student_id:s._dbId,invited_by:S.profile&&S.profile.id},{onConflict:'email'});
      if(wl&&wl.error)console.warn('[mybjj] parent2 whitelist:',wl.error);
    }
  }
}

// ---------------------------------------------------------------------------
// Delete student — owner only. Two-step confirm (GitHub / Stripe pattern):
// first OK alert, then type-the-first-name match. Then deletes the
// students row, the matching whitelist email, and any photo_approvals
// for the student. auth.users is left alone.
// ---------------------------------------------------------------------------
async function deleteStudent(sid){
  if(!isOwner())return;
  sid=sid||S.viewStu;
  const s=STUDENTS.find(x=>x.id===sid);if(!s)return;
  const first=((s.name||'').split(' ')[0]||'').trim();
  if(!first)return;
  if(!confirm('Delete '+s.name+' permanently?\n\nThis cannot be undone.'))return;
  const typed=(prompt('To confirm, type '+first.toUpperCase()+' (in capitals):')||'').trim();
  if(typed.toUpperCase()!==first.toUpperCase()){
    showSaveToast2('Confirmation did not match. Nothing was deleted.','error');
    return;
  }
  if(!s._dbId){
    // Local-only row — just remove from in-memory array.
    const ix=STUDENTS.indexOf(s);if(ix>=0)STUDENTS.splice(ix,1);
    closeStudentProfile();showSaveToast2(s.name+' deleted.');return;
  }
  const cli=initSupabase();if(!cli)return showSaveToast2('Connection issue','error');
  // Order: photo_approvals → students → whitelist. The cascade on
  // promotions / attendance / feedback (student_id FK) takes care of
  // those tables on the students delete.
  try{await cli.from('photo_approvals').delete().eq('student_id',s._dbId);}catch(e){console.warn('[mybjj] delete photos:',e);}
  const r=await cli.from('students').delete().eq('id',s._dbId);
  if(r&&r.error){console.warn('[mybjj] delete student:',r.error);showSaveToast2(friendlyMutationError(r.error),'error');return;}
  if(s.email){try{await cli.from('whitelist').delete().eq('email',s.email);}catch(e){console.warn('[mybjj] delete whitelist:',e);}}
  if(s.parentEmail){try{await cli.from('whitelist').delete().eq('email',s.parentEmail);}catch(e){console.warn('[mybjj] delete parent whitelist:',e);}}
  const ix=STUDENTS.indexOf(s);if(ix>=0)STUDENTS.splice(ix,1);
  closeStudentProfile();
  showSaveToast2(s.name+' deleted permanently.');
}

// Journey edit-mode handlers. Edits accumulate on the in-memory STUDENTS
// or STAFF row (resolved via getJnyTarget); only saveJnyEdit flushes
// the full journey array to the DB. The `sid` argument is the same
// sidKey rJnySection passes — either the student legacy id or
// 'staff:<legacy_id>'.
function openJnyEdit(sid){
  if(!canEditClassCounts())return;
  const s=getJnyTarget(sid);if(!s)return;
  S.jnyEditFor=sid;
  S.jnySnapshot=JSON.parse(JSON.stringify(s.journey||[]));
  render();
}
function cancelJnyEdit(){
  if(!S.jnyEditFor)return;
  const s=getJnyTarget(S.jnyEditFor);
  if(s&&S.jnySnapshot)s.journey=S.jnySnapshot;
  S.jnyEditFor=null;S.jnySnapshot=null;
  render();
}
async function saveJnyEdit(){
  if(!S.jnyEditFor)return;
  const sid=S.jnyEditFor;
  const isStaff=sid.startsWith('staff:');
  const s=getJnyTarget(sid);if(!s)return;
  if(!jnyHasChanges(s)){S.jnyEditFor=null;S.jnySnapshot=null;render();return;}
  if(!s._dbId){
    S.jnyEditFor=null;S.jnySnapshot=null;
    showSaveToast2('Journey updated.');render();return;
  }
  const snapshot=S.jnySnapshot;
  S.jnyEditFor=null;S.jnySnapshot=null;render();
  // Students go straight through `students.journey`; staff write
  // through edit_staff_admin so the owner-only RLS check applies.
  const r=isStaff
    ? await withSb(c=>c.rpc('edit_staff_admin',{p_legacy_id:s.id,p_payload:{journey:s.journey}}),'update staff journey')
    : await withSb(c=>c.from('students').update({journey:s.journey}).eq('id',s._dbId),'update journey');
  if(r&&r.error){
    s.journey=snapshot;
    showSaveToast2(friendlyMutationError(r.error),'error');
    render();return;
  }
  showSaveToast2('Journey saved.');
}
function jnyHasChanges(s){
  if(!s||!S.jnySnapshot)return false;
  return JSON.stringify(s.journey||[])!==JSON.stringify(S.jnySnapshot);
}
function editJnyMilestone(sid,idx){
  if(!canEditClassCounts())return;
  const s=getJnyTarget(sid);if(!s||!s.journey||!s.journey[idx])return;
  S.editJny={sid,idx,isNew:false};render();
}
function delJnyMilestone(sid,idx){
  if(!canEditClassCounts())return;
  const s=getJnyTarget(sid);if(!s||!s.journey||!s.journey[idx])return;
  const m=s.journey[idx];
  const lbl=m.label||m.date||'this milestone';
  if(!confirm('Delete this milestone?\n"'+lbl+'"\n\nThis can\'t be undone.'))return;
  s.journey.splice(idx,1);
  render();
}
function getJnyTarget(sid){
  if(sid.startsWith('staff:')){const id=sid.replace('staff:','');const s=STAFF.find(x=>x.id===id);return s;}
  return STUDENTS.find(x=>x.id===sid);
}
function closeJny(){S.editJny=null;render();}
function saveJny(){
  if(!S.editJny)return;
  const{sid,idx,isNew}=S.editJny;
  const s=getJnyTarget(sid);if(!s)return;
  const existing=isNew?null:(s.journey&&s.journey[idx]);
  const isAuto=!!(existing&&existing.auto);
  const notes=((document.getElementById('jm-notes')||{}).value||'').trim();
  // Auto entries — only notes are user-editable. Label / date / belt /
  // type / classes preserve the audit trail captured at creation.
  if(isAuto){
    s.journey[idx]={...existing,notes:notes||null};
    S.editJny=null;render();return;
  }
  const type=(document.getElementById('jm-type')||{}).value||'';
  const date=((document.getElementById('jm-date')||{}).value||'').trim();
  const belt=(document.getElementById('jm-belt')||{}).value||'';
  const label=((document.getElementById('jm-lbl')||{}).value||'').trim().slice(0,60);
  const clsv=(document.getElementById('jm-cls')||{}).value;
  if(!date)return showSaveToast2('Date is required','error');
  if(!label)return showSaveToast2('Label is required','error');
  const entry={
    label,date,done:true,
    classes:clsv!==''&&clsv!=null?parseInt(clsv,10):null,
    xfer:type==='xfer',
    type:type||null,
    notes:notes||null,
  };
  // Belt is optional — only persist when the user picked one.
  if(belt)entry.belt=belt;
  if(isNew){
    if(!s.journey)s.journey=[];
    // Insert before the first not-done (pending future) milestone so the
    // "next promotion" placeholder stays at the end.
    const fi=s.journey.findIndex(m=>!m.done);
    if(fi>=0)s.journey.splice(fi,0,entry);
    else s.journey.push(entry);
  } else {
    // Preserve current/done/auto flags so the timeline keeps rendering correctly.
    s.journey[idx]={...existing,...entry};
  }
  S.editJny=null;
  render();
}

let _dragTech=null;
function _dragTechStart(ev,week,cat,idx){_dragTech={week,cat,idx};try{ev.dataTransfer.setData('text/plain',cat+':'+idx);ev.dataTransfer.effectAllowed='move';}catch(_){}}
function _dragTechOver(ev,week,cat){if(!_dragTech||_dragTech.week!==week||_dragTech.cat!==cat)return;ev.preventDefault();try{ev.dataTransfer.dropEffect='move';}catch(_){}}
function _dragTechDrop(ev,week,cat,idx){if(!_dragTech||_dragTech.week!==week||_dragTech.cat!==cat){_dragTech=null;return;}ev.preventDefault();const from=_dragTech.idx;_dragTech=null;if(from===idx)return;moveTech(week,cat,from,idx);}
function _dragTechEnd(){_dragTech=null;}
function moveTech(week,cat,fromIdx,toIdx){
  const w=SCHED.find(x=>x.week===week);if(!w)return;
  const list=w[cat];if(!list||fromIdx<0||fromIdx>=list.length||toIdx<0||toIdx>=list.length)return;
  if(fromIdx===toIdx)return;
  const item=list.splice(fromIdx,1)[0];
  list.splice(toIdx,0,item);
  render();
}
function bumpTech(week,cat,idx,dir){
  const w=SCHED.find(x=>x.week===week);if(!w||!w[cat])return;
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=w[cat].length)return;
  moveTech(week,cat,idx,newIdx);
}

function toggleEv(id,intent){
