
# Public endpoints — the trial page and the waiver page have no session,
# so these must NOT require a JWT. Deploying without this (or without
# --no-verify-jwt) makes them return 401 before the function code runs:
# the page shows a generic error and the logs show only boot/shutdown,
# with no application error to go on. Cost an hour on 20 Jul 2026.
[functions.trial-booking]
verify_jwt = false

[functions.waiver-submit]
verify_jwt = false
